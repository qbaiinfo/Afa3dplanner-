<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfa 3D Design - Ultimate Engine Pro</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(17, 24, 39, 0.85);
            --accent-color: #2563eb;
            --accent-success: #10b981;
            --accent-danger: #ef4444;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
        }
        
        body { 
            margin: 0; overflow: hidden; 
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg-color); color: var(--text-main);
        }
        
        #canvas-container { width: 100vw; height: 100vh; }
        
        #sidebar {
            position: absolute; top: 20px; left: 20px; bottom: 20px;
            width: 350px; background: var(--panel-bg);
            backdrop-filter: blur(20px); border: 1px solid var(--border);
            border-radius: 16px; z-index: 10; display: flex; flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }
        
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .brand { font-size: 22px; font-weight: 900; letter-spacing: 1.5px; color: #fff; }
        .brand span { color: var(--accent-success); }
        
        .tabs { display: flex; background: rgba(0,0,0,0.4); padding: 4px; margin: 10px 20px; border-radius: 10px; }
        .tab-btn {
            flex: 1; padding: 10px; background: none; border: none; color: var(--text-muted);
            cursor: pointer; font-weight: 700; font-size: 13px; border-radius: 8px; transition: all 0.2s;
        }
        .tab-btn.active { background: var(--accent-color); color: white; }
        
        .tab-content { padding: 0 20px 20px 20px; flex: 1; overflow-y: auto; display: none; }
        .tab-content.active { display: block; }
        
        .section-title { font-size: 11px; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; margin-top: 15px; }
        
        .input-group { margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .input-group label { color: var(--text-main); font-size: 13px; font-weight: 500; }
        .input-group input, .input-group select { 
            width: 110px; padding: 8px; background: rgba(0,0,0,0.5); 
            border: 1px solid var(--border); border-radius: 8px; color: white; text-align: right;
            font-weight: 700; font-size: 13px;
        }
        .input-group select { text-align-last: right; padding-right: 8px; }
        
        .primary-btn { 
            width: 100%; padding: 12px; background: var(--accent-success); 
            color: white; border: none; border-radius: 10px; cursor: pointer;
            font-size: 13px; font-weight: 800; transition: all 0.2s;
            margin-top: 5px;
        }
        .primary-btn:hover { background: #059669; }
        
        .danger-btn {
            width: 100%; padding: 10px; background: var(--accent-danger);
            color: white; border: none; border-radius: 10px; cursor: pointer;
            font-size: 12px; font-weight: 700; transition: all 0.2s;
            margin-top: 10px;
        }
        .danger-btn:hover { background: #dc2626; }
        
        .modules-list { display: flex; flex-direction: column; gap: 8px; }
        .module-item {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px;
            padding: 12px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.2s;
        }
        .module-item:hover { border-color: var(--accent-color); background: rgba(37, 99, 235, 0.08); }
        .module-icon { font-size: 20px; background: rgba(0,0,0,0.3); width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .module-info { flex: 1; }
        .module-name { font-size: 13px; font-weight: 700; color: #fff; }
        .module-dim { font-size: 11px; color: var(--text-muted); font-family: monospace; }
        
        /* Object Editor Panel */
        #props-panel {
            background: rgba(30, 41, 59, 0.5); border: 1px dashed rgba(59, 130, 246, 0.3);
            border-radius: 12px; padding: 12px; margin-top: 15px; display: none;
        }
        
        #lang-switcher {
            position: absolute; top: 20px; right: 20px;
            background: var(--panel-bg); backdrop-filter: blur(20px);
            padding: 4px; border-radius: 10px; border: 1px solid var(--border);
            z-index: 10; display: flex; gap: 4px;
        }
        .lang-btn {
            background: none; border: none; padding: 6px 12px; color: var(--text-muted);
            border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 12px;
        }
        .lang-btn.active { background: var(--accent-color); color: white; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="lang-switcher">
        <button id="btn-ru" class="lang-btn active" onclick="switchLanguage('ru')">RU</button>
        <button id="btn-kk" class="lang-btn" onclick="switchLanguage('kk')">KK</button>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">
            <div class="brand">ALFA<span>3D PRO Engine</span></div>
        </div>
        
        <div class="tabs">
            <button id="btn-tab-room" class="tab-btn active" onclick="switchTab('room')">ПОМЕЩЕНИЕ</button>
            <button id="btn-tab-modules" class="tab-btn" onclick="switchTab('modules')">МОДУЛИ</button>
        </div>
        
        <!-- ROOM TAB -->
        <div id="tab-room" class="tab-content active">
            <div class="section-title" id="lbl-room-settings">Размеры помещения (мм)</div>
            <div class="input-group">
                <label id="lbl-width">Ширина (X):</label>
                <input type="number" id="room-width" value="3200" onchange="updateRoomDimensions()">
            </div>
            <div class="input-group">
                <label id="lbl-depth">Глубина (Z):</label>
                <input type="number" id="room-depth" value="4000" onchange="updateRoomDimensions()">
            </div>
            <div class="input-group">
                <label id="lbl-height">Высота (Y):</label>
                <input type="number" id="room-height" value="2500" onchange="updateRoomDimensions()">
            </div>
            
            <!-- OBJECT PARAMETERS EDITOR -->
            <div id="props-panel">
                <div class="section-title" style="margin-top:0; color:#3b82f6;" id="lbl-editor-title">Свойства выбранного модуля</div>
                <div class="input-group">
                    <label id="lbl-mod-w">Ширина (мм):</label>
                    <input type="number" id="prop-width" oninput="applySelectedProps()">
                </div>
                <div class="input-group">
                    <label id="lbl-mod-h">Высота (мм):</label>
                    <input type="number" id="prop-height" oninput="applySelectedProps()">
                </div>
                <div class="input-group">
                    <label id="lbl-mod-d">Глубина (мм):</label>
                    <input type="number" id="prop-depth" oninput="applySelectedProps()">
                </div>
                <div class="input-group">
                    <label id="lbl-mod-shelves">Кол-во полок:</label>
                    <input type="number" id="prop-shelves" min="0" max="6" oninput="applySelectedProps()">
                </div>
                <div class="input-group">
                    <label id="lbl-mod-pos">Позиция по стене:</label>
                    <select id="prop-wall-align" onchange="applySelectedProps()">
                        <option value="back">Задняя стена</option>
                        <option value="left">Левая стена</option>
                    </select>
                </div>
                <button class="danger-btn" onclick="deleteSelectedModule()" id="btn-delete">Удалить модуль</button>
            </div>
        </div>
        
        <!-- MODULES TAB -->
        <div id="tab-modules" class="tab-content">
            <div class="section-title" id="lbl-lower-modules">Нижние базы (Напольные)</div>
            <div class="modules-list">
                <div class="module-item" onclick="createNewProModule('lower_std')">
                    <div class="module-icon">🚪</div>
                    <div class="module-info">
                        <div class="module-name" id="lbl-m1">Нижний шкаф с полками</div>
                        <div class="module-dim">600 x 820 x 560 мм (Изменяемый)</div>
                    </div>
                </div>
                <div class="module-item" onclick="createNewProModule('lower_sink')">
                    <div class="module-icon">🚰</div>
                    <div class="module-info">
                        <div class="module-name" id="lbl-m2">Шкаф под мойку</div>
                        <div class="module-dim">800 x 820 x 560 мм</div>
                    </div>
                </div>
            </div>
            
            <div class="section-title" id="lbl-upper-modules">Верхние шкафы (Навесные)</div>
            <div class="modules-list">
                <div class="module-item" onclick="createNewProModule('upper_std')">
                    <div class="module-icon">🗄️</div>
                    <div class="module-info">
                        <div class="module-name" id="lbl-m3">Верхний навесной шкаф</div>
                        <div class="module-dim">600 x 720 x 320 мм (Изменяемый)</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script src="Alfa3Dplanner.js"></script>
</body>
</html>
