<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfa 3D Design - Planner Pro</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.75);
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }
        
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color);
            color: var(--text-main);
        }
        
        #canvas-container { width: 100vw; height: 100vh; }
        
        /* Modern Sidebar */
        #sidebar {
            position: absolute; top: 20px; left: 20px; bottom: 20px;
            width: 320px; background: var(--panel-bg);
            backdrop-filter: blur(12px); border: 1px solid var(--border);
            border-radius: 16px; z-index: 10; display: flex; flex-direction: column;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.5);
            overflow: hidden;
        }
        
        .sidebar-header {
            padding: 20px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        
        .brand { font-size: 20px; font-weight: 800; letter-spacing: 1px; color: #fff; }
        .brand span { color: var(--accent-color); }
        
        /* Tabs */
        .tabs { display: flex; background: rgba(0,0,0,0.2); padding: 4px; margin: 15px; border-radius: 8px; }
        .tab-btn {
            flex: 1; padding: 8px; background: none; border: none; color: var(--text-muted);
            cursor: pointer; font-weight: 600; font-size: 13px; border-radius: 6px; transition: all 0.2s;
        }
        .tab-btn.active { background: var(--accent-color); color: white; }
        
        .tab-content { padding: 0 20px 20px 20px; flex: 1; overflow-y: auto; display: none; }
        .tab-content.active { display: block; }
        
        .section-title { font-size: 14px; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 15px; }
        
        .input-group { margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .input-group label { color: var(--text-main); font-size: 14px; }
        .input-group input { 
            width: 100px; padding: 8px; background: rgba(0,0,0,0.3); 
            border: 1px solid var(--border); border-radius: 6px; color: white; text-align: right;
            font-weight: 600;
        }
        
        .primary-btn { 
            width: 100%; padding: 12px; background: var(--accent-color); 
            color: white; border: none; border-radius: 8px; cursor: pointer;
            font-size: 14px; font-weight: bold; transition: all 0.2s;
        }
        .primary-btn:hover { background: var(--accent-hover); }
        
        /* Grid List for Modules */
        .modules-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .module-card {
            background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 10px;
            padding: 12px; text-align: center; cursor: pointer; transition: all 0.2s;
        }
        .module-card:hover { border-color: var(--accent-color); background: rgba(59, 130, 246, 0.05); }
        .module-thumb { height: 50px; background: rgba(255,255,255,0.05); border-radius: 6px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .module-title { font-size: 12px; font-weight: 600; color: var(--text-main); }
        
        /* Lang Switcher */
        #lang-switcher {
            position: absolute; top: 20px; right: 20px;
            background: var(--panel-bg); backdrop-filter: blur(12px);
            padding: 6px; border-radius: 10px; border: 1px solid var(--border);
            z-index: 10; display: flex; gap: 4px;
        }
        .lang-btn {
            background: none; border: none; padding: 6px 12px; color: var(--text-muted);
            border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px;
        }
        .lang-btn.active { background: var(--accent-color); color: white; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="lang-switcher">
        <button id="btn-ru" class="lang-btn active" onclick="switchLanguage('ru')">RU</button>
        <button id="btn-kk" class="lang-btn" onclick="switchLanguage('kk')">KK</button>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">
            <div class="brand">ALFA<span>3D</span></div>
        </div>
        
        <div class="tabs">
            <button id="btn-tab-room" class="tab-btn active" onclick="switchTab('room')">Комната</button>
            <button id="btn-tab-modules" class="tab-btn" onclick="switchTab('modules')">Модули</button>
        </div>
        
        <!-- ROOM TAB -->
        <div id="tab-room" class="tab-content active">
            <div class="section-title" id="lbl-room-settings">Размеры (мм)</div>
            <div class="input-group">
                <label id="lbl-width">Ширина (X):</label>
                <input type="number" id="room-width" value="3200">
            </div>
            <div class="input-group">
                <label id="lbl-depth">Глубина (Z):</label>
                <input type="number" id="room-depth" value="4000">
            </div>
            <div class="input-group">
                <label id="lbl-height">Высота (Y):</label>
                <input type="number" id="room-height" value="2500">
            </div>
            <button class="primary-btn" onclick="updateRoomDimensions()" id="btn-update" style="margin-top: 10px;">Обновить</button>
        </div>
        
        <!-- MODULES TAB -->
        <div id="tab-modules" class="tab-content">
            <div class="section-title" id="lbl-lower-modules">Нижние модули</div>
            <div class="modules-grid">
                <div class="module-card" onclick="addKitchenModule(600, 820, 560, 'standart')">
                    <div class="module-thumb">📦</div>
                    <div class="module-title" id="lbl-mod-std">Стандарт 60см</div>
                </div>
                <div class="module-card" onclick="addKitchenModule(800, 820, 560, 'sink')">
                    <div class="module-thumb">🚰</div>
                    <div class="module-title" id="lbl-mod-sink">Мойка 80см</div>
                </div>
            </div>
            
            <div class="section-title" id="lbl-upper-modules">Верхние модули</div>
            <div class="modules-grid">
                <div class="module-card" onclick="addKitchenModule(600, 720, 320, 'upper')">
                    <div class="module-thumb">🗄️</div>
                    <div class="module-title" id="lbl-mod-top">Верхний 60см</div>
                </div>
            </div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script src="Alfa3Dplanner.js"></script>
</body>
</html>
