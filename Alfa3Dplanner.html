<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfa 3D Design - Ultimate Pro Planner</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(17, 24, 39, 0.85);
            --accent-color: #2563eb;
            --accent-success: #10b981;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
        }
        
        body { 
            margin: 0; overflow: hidden; 
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg-color); color: var(--text-main);
        }
        
        #canvas-container { width: 100vw; height: 100vh; }
        
        #sidebar {
            position: absolute; top: 20px; left: 20px; bottom: 20px;
            width: 340px; background: var(--panel-bg);
            backdrop-filter: blur(20px); border: 1px solid var(--border);
            border-radius: 16px; z-index: 10; display: flex; flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }
        
        .sidebar-header { padding: 24px; border-bottom: 1px solid var(--border); }
        .brand { font-size: 22px; font-weight: 900; letter-spacing: 1.5px; color: #fff; }
        .brand span { color: var(--accent-success); }
        
        .tabs { display: flex; background: rgba(0,0,0,0.4); padding: 4px; margin: 0 20px 15px 20px; border-radius: 10px; }
        .tab-btn {
            flex: 1; padding: 10px; background: none; border: none; color: var(--text-muted);
            cursor: pointer; font-weight: 700; font-size: 13px; border-radius: 8px; transition: all 0.2s;
        }
        .tab-btn.active { background: var(--accent-color); color: white; }
        
        .tab-content { padding: 0 20px 20px 20px; flex: 1; overflow-y: auto; display: none; }
        .tab-content.active { display: block; }
        
        .section-title { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; }
        
        .input-group { margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
        .input-group label { color: var(--text-main); font-size: 14px; font-weight: 500; }
        .input-group input { 
            width: 110px; padding: 10px; background: rgba(0,0,0,0.5); 
            border: 1px solid var(--border); border-radius: 8px; color: white; text-align: right;
            font-weight: 700; font-size: 14px;
        }
        .input-group input:focus { border-color: var(--accent-color); outline: none; }
        
        .primary-btn { 
            width: 100%; padding: 14px; background: var(--accent-success); 
            color: white; border: none; border-radius: 10px; cursor: pointer;
            font-size: 14px; font-weight: 800; transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }
        .primary-btn:hover { background: #059669; transform: translateY(-1px); }
        
        .modules-list { display: flex; flex-direction: column; gap: 12px; }
        .module-item {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px;
            padding: 16px; display: flex; align-items: center; gap: 16px; cursor: pointer; transition: all 0.2s;
        }
        .module-item:hover { border-color: var(--accent-color); background: rgba(37, 99, 235, 0.08); transform: translateX(4px); }
        .module-icon { font-size: 24px; background: rgba(0,0,0,0.3); width: 48px; height: 48px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .module-info { flex: 1; }
        .module-name { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .module-dim { font-size: 12px; color: var(--text-muted); font-family: monospace; }
        
        #lang-switcher {
            position: absolute; top: 20px; right: 20px;
            background: var(--panel-bg); backdrop-filter: blur(20px);
            padding: 4px; border-radius: 10px; border: 1px solid var(--border);
            z-index: 10; display: flex; gap: 4px;
        }
        .lang-btn {
            background: none; border: none; padding: 8px 16px; color: var(--text-muted);
            border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 12px; transition: all 0.2s;
        }
        .lang-btn.active { background: var(--accent-color); color: white; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="lang-switcher">
        <button id="btn-ru" class="lang-btn active" onclick="switchLanguage('ru')">RU</button>
        <button id="btn-kk" class="lang-btn" onclick="switchLanguage('kk')">KK</button>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">
            <div class="brand">ALFA<span>3D PRO</span></div>
        </div>
        
        <div class="tabs">
            <button id="btn-tab-room" class="tab-btn active" onclick="switchTab('room')">ПОМЕЩЕНИЕ</button>
            <button id="btn-tab-modules" class="tab-btn" onclick="switchTab('modules')">МОДУЛИ</button>
        </div>
        
        <!-- ROOM TAB -->
        <div id="tab-room" class="tab-content active">
            <div class="section-title" id="lbl-room-settings">Габариты каркаса (мм)</div>
            <div class="input-group">
                <label id="lbl-width">Ширина (X):</label>
                <input type="number" id="room-width" value="3200">
            </div>
            <div class="input-group">
                <label id="lbl-depth">Глубина (Z):</label>
                <input type="number" id="room-depth" value="4000">
            </div>
            <div class="input-group">
                <label id="lbl-height">Высота (Y):</label>
                <input type="number" id="room-height" value="2500">
            </div>
            <button class="primary-btn" onclick="updateRoomDimensions()" id="btn-update" style="margin-top: 12px;">Применить размеры</button>
        </div>
        
        <!-- MODULES TAB -->
        <div id="tab-modules" class="tab-content">
            <div class="section-title" id="lbl-lower-modules">Нижние базы (H=820, D=560)</div>
            <div class="modules-list">
                <div class="module-item" onclick="addProKitchenModule(600, 820, 560, 'single_door')">
                    <div class="module-icon">🚪</div>
                    <div class="module-info">
                        <div class="module-name" id="lbl-mod-std">Распашной шкаф N600</div>
                        <div class="module-dim">600 x 820 x 560 мм</div>
                    </div>
                </div>
                <div class="module-item" onclick="addProKitchenModule(800, 820, 560, 'sink')">
                    <div class="module-icon">🚰</div>
                    <div class="module-info">
                        <div class="module-name" id="lbl-mod-sink">Мойка под раковину N800</div>
                        <div class="module-dim">800 x 820 x 560 мм</div>
                    </div>
                </div>
            </div>
            
            <div class="section-title" id="lbl-upper-modules" style="margin-top: 24px;">Верхние шкафы (H=720, D=320)</div>
            <div class="modules-list">
                <div class="module-item" onclick="addProKitchenModule(600, 720, 320, 'upper_door')">
                    <div class="module-icon">🗄️</div>
                    <div class="module-info">
                        <div class="module-name" id="lbl-mod-top">Навесной шкаф V600</div>
                        <div class="module-dim">600 x 720 x 320 мм</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script src="Alfa3Dplanner.js"></script>
</body>
</html>
