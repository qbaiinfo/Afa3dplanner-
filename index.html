<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alfa 3D Planner — Проектирование мебели</title>
<script>
// GLOBAL HATA YAKALAYICI - ekranda gösterir
window.addEventListener('error', function(e){
  var box = document.getElementById('errBox') || (function(){
    var d = document.createElement('div');
    d.id = 'errBox';
    d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#dc2626;color:#fff;padding:14px;z-index:99999;font-family:monospace;font-size:13px;white-space:pre-wrap;word-break:break-all';
    document.body.appendChild(d);
    return d;
  })();
  box.textContent = '❌ ОШИБКА: ' + e.message + '\nФайл: ' + (e.filename||'').split('/').pop() + ' :' + e.lineno;
});
</script>
<style>
  :root{
    --orange:#f97316; --orange-dark:#ea580c; --dark:#0f172a; --dark2:#1e293b;
    --gray:#64748b; --light:#f1f5f9; --border:#e2e8f0; --green:#16a34a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0a0e1a;color:#e2e8f0;min-height:100vh;padding:20px}

  /* Header */
  .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;padding:0 20px}
  .logo{font-weight:900;font-size:24px;letter-spacing:1px}
  .logo span{color:var(--orange)}
  .header-actions{display:flex;gap:12px}
  .btn-primary{padding:10px 16px;background:var(--orange);color:#fff;border:none;border-radius:8px;
    font-weight:700;cursor:pointer;font-size:14px;transition:.2s}
  .btn-primary:hover{background:var(--orange-dark)}
  .btn-ghost{padding:10px 16px;background:transparent;color:#e2e8f0;border:1px solid rgba(255,255,255,.2);
    border-radius:8px;font-weight:700;cursor:pointer;font-size:14px;transition:.2s}
  .btn-ghost:hover{background:rgba(255,255,255,.08)}

  /* Projects Grid */
  .projects-container{max-width:1400px;margin:0 auto}
  .projects-title{font-size:18px;font-weight:700;margin-bottom:16px;padding:0 20px}
  .projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:0 20px}

  /* Project Card */
  .project-card{background:var(--dark2);border:1px solid rgba(255,255,255,.1);border-radius:12px;
    padding:16px;cursor:pointer;transition:.3s;position:relative;overflow:hidden}
  .project-card:hover{background:var(--dark);border-color:var(--orange);transform:translateY(-4px);box-shadow:0 8px 16px rgba(249,115,22,.2)}
  .project-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--orange);transform:scaleX(0);transition:.3s}
  .project-card:hover::before{transform:scaleX(1)}

  .project-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
  .project-name{font-weight:700;font-size:15px}
  .project-date{font-size:11px;color:var(--gray)}
  .project-customer{font-size:13px;color:#cbd5e1;margin-bottom:8px}
  .project-stats{display:flex;gap:12px;font-size:12px;color:var(--gray);margin-bottom:12px}
  .project-status{display:inline-block;padding:4px 8px;border-radius:4px;font-size:11px;font-weight:700;
    background:rgba(22,163,74,.2);color:var(--green)}
  .project-status.draft{background:rgba(100,116,139,.2);color:var(--gray)}
  .project-status.approved{background:rgba(34,197,94,.2);color:#22c55e}
  .project-status.rejected{background:rgba(220,38,38,.2);color:#ef4444}

  .project-actions{display:flex;gap:8px;margin-top:12px}
  .project-actions button{flex:1;padding:8px;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;transition:.2s}
  .edit-btn{background:var(--orange);color:#fff}
  .edit-btn:hover{background:var(--orange-dark)}
  .delete-btn{background:rgba(220,38,38,.2);color:#ef4444;border:1px solid rgba(220,38,38,.4)}
  .delete-btn:hover{background:rgba(220,38,38,.3)}

  /* New Project Card */
  .new-project-card{background:rgba(249,115,22,.1);border:2px dashed var(--orange);border-radius:12px;
    padding:32px 16px;text-align:center;cursor:pointer;transition:.3s;display:flex;
    flex-direction:column;align-items:center;justify-content:center;min-height:180px}
  .new-project-card:hover{background:rgba(249,115,22,.15);border-color:var(--orange-dark)}
  .new-project-card .big-icon{font-size:32px;margin-bottom:8px}
  .new-project-card p{font-size:14px;font-weight:700;color:#fff}

  /* Modal */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
  .modal.open{display:flex}
  .modal-content{background:var(--dark2);border-radius:12px;padding:28px;max-width:500px;width:100%;border:1px solid rgba(255,255,255,.1)}
  .modal-title{font-size:18px;font-weight:700;margin-bottom:20px}
  .form-group{margin-bottom:16px}
  .form-group label{display:block;font-size:12px;font-weight:700;color:var(--gray);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
  .form-group input,.form-group select{width:100%;padding:10px 12px;background:#0f172a;border:1px solid rgba(255,255,255,.1);
    border-radius:6px;color:#fff;font-size:14px;font-family:inherit}
  .form-group input::placeholder{color:var(--gray)}
  .form-group select option{background:#0f172a;color:#fff}

  .templates-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
  .template-btn{padding:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:6px;
    cursor:pointer;transition:.2s;text-align:center;color:#cbd5e1;font-size:12px;font-weight:700}
  .template-btn:hover{background:rgba(255,255,255,.1);border-color:var(--orange)}
  .template-btn.selected{background:var(--orange);color:#fff;border-color:var(--orange)}
  .template-icon{font-size:20px;margin-bottom:4px;display:block}

  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
  .btn-cancel{padding:10px 16px;background:rgba(255,255,255,.08);color:#fff;border:none;border-radius:6px;
    cursor:pointer;font-weight:700;transition:.2s}
  .btn-cancel:hover{background:rgba(255,255,255,.15)}

  /* Empty State */
  .empty-state{text-align:center;padding:60px 20px}
  .empty-state .icon{font-size:48px;margin-bottom:16px}
  .empty-state h2{font-size:18px;font-weight:700;margin-bottom:8px}
  .empty-state p{color:var(--gray);font-size:14px;margin-bottom:20px}

  /* Responsive */
  @media(max-width:768px){
    .projects-grid{grid-template-columns:1fr}
    .header{flex-direction:column;gap:16px;align-items:flex-start}
  }

  /* Loading */
  .loading{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--orange);
    border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">ALFA<span> 3D</span> PLANNER</div>
  </div>
  <div class="header-actions">
    <button class="btn-ghost" onclick="openSettings()">⚙️ Параметры</button>
    <button class="btn-ghost" onclick="logout()">🚪 Выход</button>
  </div>
</div>

<div class="projects-container">
  <div class="projects-title">Мои проекты</div>
  <div class="projects-grid" id="projectsGrid">
    <div class="new-project-card" onclick="openNewProjectModal()">
      <div class="big-icon">➕</div>
      <p>Новый проект</p>
    </div>
    <div id="projectsContainer" style="display:contents"></div>
  </div>
</div>

<!-- New Project Modal -->
<div class="modal" id="newProjectModal">
  <div class="modal-content">
    <div class="modal-title">Новый проект</div>
    
    <div class="form-group">
      <label>Имя проекта</label>
      <input type="text" id="projectName" placeholder="Например: Кухня Мария">
    </div>

    <div class="form-group">
      <label>Имя клиента</label>
      <input type="text" id="customerName" placeholder="ФИО клиента">
    </div>

    <div class="form-group">
      <label>Телефон клиента</label>
      <input type="tel" id="customerPhone" placeholder="+7 (7XX) XXX-XX-XX">
    </div>

    <div class="form-group">
      <label>Выберите шаблон</label>
      <div class="templates-grid" id="templatesGrid">
        <!-- JS заполнит -->
      </div>
    </div>

    <div class="form-group">
      <label>Комната (см)</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <input type="number" id="roomWidth" placeholder="Ширина" value="400">
        <input type="number" id="roomDepth" placeholder="Глубина" value="300">
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('newProjectModal')">Отмена</button>
      <button class="btn-primary" onclick="createProject()">Создать</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// Supabase config
const SUPABASE_URL = 'https://fciofuexujtxxjlamxno.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjaW9mdWV4dWp0eHhqbGFteG5vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNTYwOTcsImV4cCI6MjA5NTczMjA5N30.dDvtfabQ6xHmSd5NDntme2ggJpzNKLtXovFFDW2Kc80';
let supabase = null;
try{
  if(window.supabase && window.supabase.createClient){
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  } else {
    console.error('⚠️ Supabase CDN загрузился неправильно');
  }
}catch(e){
  console.error('Supabase init error:', e);
}

const TEMPLATES = [
  {id:'straight', name:'Прямая', icon:'📏', desc:'Однорядная кухня'},
  {id:'l-shaped', name:'L-образная', icon:'⌐', desc:'Угловая кухня'},
  {id:'u-shaped', name:'U-образная', icon:'⊔', desc:'П-образная кухня'},
  {id:'wardrobe', name:'Гардероб', icon:'👔', desc:'Система шкафов'},
];

let selectedTemplate = 'straight';
let projects = [];

async function init(){
  try{
    renderTemplates();
  }catch(e){ console.error('Template render error:', e); }

  try{
    await loadProjects();
    renderProjects();
  }catch(e){
    console.error('Projects load error:', e);
    renderProjects(); // boş da olsa render et
  }
  console.log('✅ Alfa 3D Planner loaded');
}

function renderTemplates(){
  const grid = document.getElementById('templatesGrid');
  grid.innerHTML = TEMPLATES.map(t => `
    <div class="template-btn ${t.id === selectedTemplate ? 'selected' : ''}" 
         onclick="selectTemplate('${t.id}')">
      <span class="template-icon">${t.icon}</span>
      <span>${t.name}</span>
    </div>
  `).join('');
}

function selectTemplate(id){
  selectedTemplate = id;
  renderTemplates();
}

async function loadProjects(){
  if(!supabase){ projects = []; return; }
  try{
    const {data, error} = await supabase.from('alfa_3d_projects').select('*').order('created_at', {ascending:false});
    if(error) throw error;
    projects = data || [];
  }catch(e){
    console.error('Load error:', e);
    projects = [];
  }
}

function renderProjects(){
  const container = document.getElementById('projectsContainer');
  if(!container) return;

  if(!projects || projects.length === 0){
    container.innerHTML = `
      <div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--gray)">
        <p>📭 Проектов нет. Создайте новый!</p>
      </div>
    `;
    return;
  }

  container.innerHTML = projects.map(p => `
    <div class="project-card">
      <div class="project-header">
        <div class="project-name">${p.project_name || 'Без имени'}</div>
        <div class="project-date">${p.created_at ? new Date(p.created_at).toLocaleDateString('ru-RU') : ''}</div>
      </div>
      <div class="project-customer">👤 ${p.customer_name || 'Нет имени'}</div>
      <div class="project-stats">
        <span>📦 ${(p.stats && p.stats.modules) || 0} модулей</span>
        <span>🪵 ${(p.stats && p.stats.board) || 0}м²</span>
      </div>
      <div class="project-status ${p.status || 'draft'}">${getStatusText(p.status)}</div>
      <div class="project-actions">
        <button class="edit-btn" onclick="editProject('${p.id}')">Редактировать</button>
        <button class="delete-btn" onclick="deleteProject('${p.id}')">🗑</button>
      </div>
    </div>
  `).join('');
}

function getStatusText(status){
  const map = {draft:'Черновик', sent:'Отправлено', approved:'✓ Одобрено', rejected:'✗ Отклонено'};
  return map[status] || 'Черновик';
}

function openNewProjectModal(){
  document.getElementById('newProjectModal').classList.add('open');
}

function closeModal(id){
  document.getElementById(id).classList.remove('open');
}

async function createProject(){
  const name = document.getElementById('projectName').value.trim();
  const customer = document.getElementById('customerName').value.trim();
  const phone = document.getElementById('customerPhone').value.trim();
  const roomW = parseInt(document.getElementById('roomWidth').value) || 400;
  const roomD = parseInt(document.getElementById('roomDepth').value) || 300;

  if(!name || !customer){
    alert('Заполните имя проекта и клиента');
    return;
  }

  if(!supabase){
    alert('Нет связи с базой данных. Обновите страницу.');
    return;
  }

  const projectData = {
    project_name: name,
    customer_name: customer,
    customer_phone: phone,
    template: selectedTemplate,
    room_width: roomW,
    room_depth: roomD,
    modules: [],
    stats: {modules:0, board:0, facade:0, edge:0},
    status: 'draft',
    created_at: new Date().toISOString(),
    updated_at: new Date().toISOString()
  };

  try{
    const {data, error} = await supabase.from('alfa_3d_projects').insert([projectData]).select();
    if(error) throw error;
    
    closeModal('newProjectModal');
    document.getElementById('projectName').value = '';
    document.getElementById('customerName').value = '';
    document.getElementById('customerPhone').value = '';
    
    // Автоматически открыть редактор
    if(data && data[0]){
      editProject(data[0].id);
    } else {
      await loadProjects();
      renderProjects();
    }
  }catch(e){
    console.error('Create error:', e);
    alert('Ошибка при создании проекта: ' + (e.message || e));
  }
}

function editProject(projectId){
  window.location.href = `editor.html?id=${projectId}`;
}

async function deleteProject(projectId){
  if(!confirm('Удалить проект?')) return;
  
  try{
    const {error} = await supabase.from('alfa_3d_projects').delete().eq('id', projectId);
    if(error) throw error;
    
    await loadProjects();
    renderProjects();
  }catch(e){
    console.error('Delete error:', e);
    alert('Ошибка при удалении');
  }
}

function openSettings(){
  alert('⚙️ Параметры (скоро)');
}

function logout(){
  alert('Выход (интегрировать с Baibesik auth)');
}

// Init on load
init();
</script>

</body>
</html>
