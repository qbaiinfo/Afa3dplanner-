<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Alfa 3D Planner — Редактор</title>
<style>
  :root{
    --orange:#f97316; --orange-dark:#ea580c; --dark:#0f172a; --dark2:#1e293b;
    --dark3:#162033; --gray:#64748b; --light:#f1f5f9; --green:#16a34a;
    --line:rgba(255,255,255,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0a0e1a;color:#e2e8f0}

  /* ── TOPBAR ── */
  .topbar{position:fixed;top:0;left:0;right:0;height:52px;background:var(--dark2);
    display:flex;align-items:center;justify-content:space-between;padding:0 10px;z-index:100;
    border-bottom:1px solid var(--line)}
  .tb-left{display:flex;align-items:center;gap:8px;min-width:0}
  .tb-back{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:6px;flex:0 0 auto}
  .tb-title{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tb-ver{font-size:9px;color:#334155;flex:0 0 auto}
  .tb-actions{display:flex;gap:5px;flex:0 0 auto}
  .tb-btn{padding:8px 10px;background:rgba(255,255,255,.07);border:none;border-radius:7px;color:#fff;
    font-size:16px;cursor:pointer;transition:.15s;line-height:1}
  .tb-btn:active{background:rgba(255,255,255,.2)}
  .tb-btn.primary{background:var(--orange)}
  .tb-btn .lbl{font-size:12px;font-weight:700;margin-left:4px}

  /* ── CANVAS ── */
  #canvas-wrap{position:fixed;top:52px;left:0;right:0;bottom:0;
    background:radial-gradient(ellipse at 50% 30%,#1c2742 0%,#0a0e1a 75%)}
  #canvas-wrap canvas{display:block;width:100%;height:100%;touch-action:none}

  /* görünüm küpleri */
  .view-ctrl{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:5px;z-index:10}
  .view-btn{width:34px;height:34px;background:rgba(30,41,59,.92);border:1px solid var(--line);
    border-radius:7px;color:#fff;font-size:12px;font-weight:700;cursor:pointer}
  .view-btn:active{background:var(--orange)}

  /* empty hint */
  .empty-hint{position:absolute;top:46%;left:50%;transform:translate(-50%,-50%);text-align:center;
    color:var(--gray);z-index:5;pointer-events:none;width:80%}
  .empty-hint .big{font-size:42px;margin-bottom:10px;opacity:.4}
  .empty-hint p{font-size:13px;line-height:1.5}

  /* ── INFO BAR ── */
  .infobar{position:fixed;left:0;right:0;bottom:0;height:46px;background:rgba(15,23,42,.95);
    backdrop-filter:blur(8px);display:flex;align-items:center;gap:14px;padding:0 14px;z-index:80;
    border-top:1px solid var(--line);font-size:11px;overflow-x:auto;white-space:nowrap}
  .infobar b{color:var(--orange);margin-left:3px}

  /* ── BOTTOM TABS (paleta açma) ── */
  .palette-tabs{position:fixed;left:0;right:0;bottom:46px;height:54px;background:var(--dark2);
    display:flex;z-index:85;border-top:1px solid var(--line);overflow-x:auto}
  .ptab{flex:1 0 auto;min-width:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;background:none;border:none;color:var(--gray);cursor:pointer;font-size:9px;font-weight:700;
    padding:6px 8px;transition:.15s;border-top:2px solid transparent}
  .ptab .pico{font-size:18px}
  .ptab.active{color:var(--orange);border-top-color:var(--orange);background:var(--dark3)}

  /* ── PALETTE DRAWER (modül listesi) ── */
  .palette{position:fixed;left:0;right:0;bottom:100px;background:var(--dark2);z-index:84;
    max-height:46vh;overflow-y:auto;transform:translateY(150vh);transition:transform .28s ease;
    border-top:2px solid var(--orange);border-radius:14px 14px 0 0;padding:10px 0 14px}
  .palette.open{transform:translateY(0)}
  .palette-head{display:flex;align-items:center;justify-content:space-between;padding:4px 16px 10px;
    position:sticky;top:0;background:var(--dark2);z-index:2}
  .palette-head h3{font-size:13px;font-weight:800}
  .palette-close{background:none;border:none;color:var(--gray);font-size:22px;cursor:pointer;line-height:1}
  .palette-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;padding:0 12px}
  .pitem{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:9px;padding:10px 6px;
    text-align:center;cursor:pointer;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:3px}
  .pitem:active{background:var(--orange);transform:scale(.95)}
  .pitem .ico{font-size:24px}
  .pitem .nm{font-size:10px;font-weight:700;line-height:1.15}
  .pitem .dm{font-size:8px;color:var(--gray)}

  /* ── PROPS PANEL (seçili modül) ── */
  .props{position:fixed;left:0;right:0;bottom:100px;background:var(--dark2);z-index:86;
    max-height:50vh;overflow-y:auto;transform:translateY(150vh);transition:transform .28s ease;
    border-top:2px solid var(--green);border-radius:14px 14px 0 0;padding:14px 16px 20px}
  .props.open{transform:translateY(0)}
  .props-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .props-head h3{font-size:14px;font-weight:800}
  .props-close{background:none;border:none;color:var(--gray);font-size:22px;cursor:pointer}
  .prop-row{margin-bottom:14px}
  .prop-row label{font-size:11px;font-weight:700;color:var(--gray);display:block;margin-bottom:6px}
  .prop-row .val{color:var(--orange);float:right}
  .prop-row input[type=range]{width:100%;accent-color:var(--orange)}
  .prop-row input[type=number]{width:100%;padding:8px;background:#0f172a;border:1px solid var(--line);
    border-radius:6px;color:#fff;font-size:13px}
  .dim-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .color-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:4px}
  .csw{width:100%;aspect-ratio:1;border-radius:7px;cursor:pointer;border:2px solid transparent}
  .csw.active{border-color:#fff;transform:scale(1.12)}
  .props-actions{display:flex;gap:8px;margin-top:8px}
  .props-actions button{flex:1;padding:11px;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:12px}
  .btn-dup{background:var(--green);color:#fff}
  .btn-del{background:rgba(220,38,38,.25);color:#f87171;border:1px solid rgba(220,38,38,.4)}

  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:83}
  .overlay.open{display:block}

  /* ── DESKTOP ── */
  @media(min-width:900px){
    .tb-btn .lbl{display:inline}
    .palette-tabs{top:52px;bottom:auto;left:0;width:84px;height:auto;flex-direction:column;
      border-top:none;border-right:1px solid var(--line);overflow-y:auto}
    .ptab{flex:0 0 auto;border-top:none;border-left:2px solid transparent;padding:12px 4px}
    .ptab.active{border-top-color:transparent;border-left-color:var(--orange)}
    .palette{left:84px;width:280px;right:auto;top:52px;bottom:46px;max-height:none;
      border-radius:0;border-top:none;border-right:2px solid var(--orange);
      transform:translateX(-120vw)}
    .palette.open{transform:translateX(0)}
    .palette-grid{grid-template-columns:1fr 1fr}
    #canvas-wrap{left:84px}
    .infobar{left:84px}
    .props{left:auto;right:0;top:52px;bottom:46px;width:300px;max-height:none;
      border-radius:0;border-top:none;border-left:2px solid var(--green);transform:translateX(120vw)}
    .props.open{transform:translateX(0)}
    .empty-hint{left:calc(50% + 42px)}
  }

  /* debug rozet */
  #dbg{position:fixed;bottom:104px;left:8px;z-index:500;background:rgba(0,0,0,.75);color:#7dd3fc;
    font-family:monospace;font-size:10px;padding:4px 8px;border-radius:6px;pointer-events:none;max-width:60vw}
  #err{position:fixed;top:52px;left:0;right:0;background:#dc2626;color:#fff;padding:8px 12px;z-index:9999;
    font-family:monospace;font-size:11px;display:none;white-space:pre-wrap;word-break:break-all}
</style>
</head>

    <button class="tb-btn" onclick="undo()" title="Отмена">↶</button>

    <button class="tb-btn primary" onclick="saveProject()" title="Сохранить">💾<span class="lbl">Сохранить</span></button>

<!-- Kategori sekmeleri -->

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div id="canvas-wrap">

</div>

<div class="infobar">

  <div>🪵 ЛДСП:<b id="stBoard">0</b>м²</div>
  <div>🚪 Фасады:<b id="stFacade">0</b>м²</div>
  <div>📏 Кромка:<b id="stEdge">0</b>м</div>
</div>

<div id="dbg">init...</div>

<script>

});

var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjaW9mdWV4dWp0eHhqbGFteG5vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNTYwOTcsImV4cCI6MjA5NTczMjA5N30.dDvtfabQ6xHmSd5NDntme2ggJpzNKLtXovFFDW2Kc80';

try{ if(window.supabase&&window.supabase.createClient) sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY); }catch(e){ console.error(e); }

  ]},
  {id:'decor', tab:'Декор', ico:'🪴', items:[

  ]}
];

var COLORS=[
  {hex:'#ffffff',name:'Белый'},   {hex:'#e8e0d0',name:'Беж'},
  {hex:'#c8915a',name:'Дуб'},     {hex:'#8b5a2b',name:'Орех'},
  {hex:'#5a4632',name:'Венге'},   {hex:'#2b2b2b',name:'Чёрный'},
  {hex:'#9aa6b2',name:'Серый'},   {hex:'#1e5945',name:'Зелёный'},
  {hex:'#1e3a5f',name:'Синий'},   {hex:'#7a1f2b',name:'Бордо'},
  {hex:'#d4af37',name:'Золото'},  {hex:'#f0f0f0',name:'Глянец'}
];

function findItem(type){
  for(var c=0;c<CATALOG.length;c++)
    for(var i=0;i<CATALOG[c].items.length;i++)
      if(CATALOG[c].items[i].type===type) return CATALOG[c].items[i];
  return null;
}

// ════════ STATE ════════
var scene,camera,renderer,raycaster,pointer;
var modules=[], selected=null, project=null;
var hist=[], histIdx=-1;
var camA={theta:0.8,phi:0.95,radius:6}, camT;
var activeTab=null;

// ════════ THREE INIT ════════
function initThree(){
  if(scene) return true;
  if(typeof THREE==='undefined'){ showErr('THREE не загрузился'); return false; }
  var wrap=document.getElementById('canvas-wrap');
  if(!wrap) return false;
  var W=wrap.clientWidth||window.innerWidth, H=wrap.clientHeight||window.innerHeight;

  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x0a0e1a);
  camera=new THREE.PerspectiveCamera(60,W/H,0.05,100);
  camT=new THREE.Vector3(0,0.8,0);

  renderer=new THREE.WebGLRenderer({antialias:true,preserveDrawingBuffer:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(W,H);
  renderer.shadowMap.enabled=true;
  wrap.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff,0.65));
  var dl=new THREE.DirectionalLight(0xffffff,0.85);
  dl.position.set(4,8,5); dl.castShadow=true; scene.add(dl);
  var dl2=new THREE.DirectionalLight(0xffffff,0.3);
  dl2.position.set(-5,3,-4); scene.add(dl2);

  // zemin
  var floor=new THREE.Mesh(
    new THREE.PlaneGeometry(20,20),
    new THREE.MeshStandardMaterial({color:0x1a2236,roughness:1})
  );
  floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; floor.userData.helper=true;
  scene.add(floor);
  var grid=new THREE.GridHelper(20,40,0x33415a,0x1e2a40);
  grid.userData.helper=true; scene.add(grid);

  raycaster=new THREE.Raycaster();
  pointer=new THREE.Vector2();

  updateCam();
  setupControls(wrap);
  animate();
  window.addEventListener('resize',onResize);
  return true;
}

function onResize(){
  if(!renderer||!camera) return;
  var wrap=document.getElementById('canvas-wrap');
  var W=wrap.clientWidth||window.innerWidth, H=wrap.clientHeight||window.innerHeight;
  camera.aspect=W/H; camera.updateProjectionMatrix(); renderer.setSize(W,H);
}

function updateCam(){
  if(!camera) return;
  var s=camA;
  camera.position.x=camT.x+s.radius*Math.sin(s.phi)*Math.cos(s.theta);
  camera.position.y=camT.y+s.radius*Math.cos(s.phi);
  camera.position.z=camT.z+s.radius*Math.sin(s.phi)*Math.sin(s.theta);
  camera.lookAt(camT);
}

function setView(t){
  if(t==='top') camA={theta:Math.PI/2,phi:0.05,radius:7};
  else if(t==='front') camA={theta:Math.PI/2,phi:Math.PI/2-0.05,radius:6};
  else camA={theta:0.8,phi:0.95,radius:6};
  updateCam();
}
function resetCam(){ camT.set(0,0.8,0); setView('3d'); }

function setupControls(el){
  var lx,ly,mode=null,pdist=0;
  el.addEventListener('mousedown',function(e){ mode=(e.button===2?'pan':'rot'); lx=e.clientX; ly=e.clientY; });
  window.addEventListener('mouseup',function(){ mode=null; });
  el.addEventListener('mousemove',function(e){
    if(!mode) return;
    var dx=e.clientX-lx, dy=e.clientY-ly; lx=e.clientX; ly=e.clientY;
    if(mode==='rot'){ camA.theta-=dx*0.01; camA.phi=Math.max(0.1,Math.min(Math.PI/2-0.02,camA.phi-dy*0.01)); }
    else { camT.x-=dx*0.01; camT.y+=dy*0.01; }
    updateCam();
  });
  el.addEventListener('wheel',function(e){ e.preventDefault(); camA.radius=Math.max(1.5,Math.min(20,camA.radius+e.deltaY*0.01)); updateCam(); },{passive:false});
  el.addEventListener('contextmenu',function(e){ e.preventDefault(); });
  // tıkla = seç
  el.addEventListener('click',function(e){ pickAt(e.clientX,e.clientY,el); });

  // touch
  el.addEventListener('touchstart',function(e){
    if(e.touches.length===1){ mode='rot'; lx=e.touches[0].clientX; ly=e.touches[0].clientY; }
    else if(e.touches.length===2){ mode='pinch'; pdist=tdist(e); }
  },{passive:false});
  el.addEventListener('touchmove',function(e){
    e.preventDefault();
    if(mode==='rot'&&e.touches.length===1){
      var dx=e.touches[0].clientX-lx, dy=e.touches[0].clientY-ly; lx=e.touches[0].clientX; ly=e.touches[0].clientY;
      camA.theta-=dx*0.01; camA.phi=Math.max(0.1,Math.min(Math.PI/2-0.02,camA.phi-dy*0.01)); updateCam();
    } else if(mode==='pinch'&&e.touches.length===2){
      var d=tdist(e); camA.radius=Math.max(1.5,Math.min(20,camA.radius-(d-pdist)*0.02)); pdist=d; updateCam();
    }
  },{passive:false});
  el.addEventListener('touchend',function(e){
    if(mode==='rot'&&e.changedTouches.length===1){
      // kısa dokunuş = seçim
      pickAt(e.changedTouches[0].clientX,e.changedTouches[0].clientY,el);
    }
    mode=null;
  });
}
function tdist(e){ return Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); }

function pickAt(cx,cy,el){
  if(!raycaster||!camera) return;
  var r=el.getBoundingClientRect();
  pointer.x=((cx-r.left)/r.width)*2-1;
  pointer.y=-((cy-r.top)/r.height)*2+1;
  raycaster.setFromCamera(pointer,camera);
  var meshes=modules.map(function(m){return m.mesh;}).filter(Boolean);
  var hits=raycaster.intersectObjects(meshes,true);
  if(hits.length){
    var o=hits[0].object; while(o.parent&&!o.userData.modId) o=o.parent;
    var mod=modules.find(function(m){return m.id===o.userData.modId;});
    if(mod) selectModule(mod);
  }
}

function animate(){
  requestAnimationFrame(animate);
  if(renderer&&scene&&camera) renderer.render(scene,camera);
}

// ════════ MODULES ════════
function addModule(type){
  dbg('addModule: '+type);
  if(!initThree()){ showErr('3D не готов'); return; }
  var info=findItem(type)||{w:600,h:850,d:560,name:type};
  var w=info.w/1000, h=info.h/1000, d=info.d/1000; // mm→m

  // yan yana diz
  var offX=0; modules.forEach(function(m){ offX+=m.w; });
  offX -= modules.reduce(function(a,m){return a+m.w;},0)/2; // ortala

  var mod={
    id:'m'+Date.now()+Math.floor(Math.random()*1000),
    type:type, name:info.name, w:w, h:h, d:d,
    x:offX+w/2, z:0, color:'#c8915a', mesh:null
  };
  buildMesh(mod);
  modules.push(mod);
  pushHist();
  updateStats();
  layoutRow();
  selectModule(mod);
  closePalette();
  dbg('OK: '+modules.length+' модулей');
}

function buildMesh(mod){
  var geo=new THREE.BoxGeometry(mod.w,mod.h,mod.d);
  var mat=new THREE.MeshStandardMaterial({color:mod.color,roughness:0.6,metalness:0.05});
  var mesh=new THREE.Mesh(geo,mat);
  mesh.castShadow=true;
  mesh.userData.modId=mod.id;
  // kenar
  var edg=new THREE.LineSegments(new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({color:0x000000,transparent:true,opacity:0.2}));
  mesh.add(edg);
  mesh.position.set(mod.x, mod.h/2, mod.z);
  scene.add(mesh);
  mod.mesh=mesh;
}

function layoutRow(){
  // alt+üst dolapları sıralı diz
  var x=-modules.reduce(function(a,m){return a+m.w;},0)/2;
  modules.forEach(function(m){
    m.x=x+m.w/2;
    var y=m.h/2;
    if(m.type.indexOf('wall')===0) y=1.45+m.h/2; // üst dolaplar yukarıda
    if(m.mesh) m.mesh.position.set(m.x,y,m.z);
    x+=m.w;
  });
}

function selectModule(mod){
  selected=mod;
  // vurgula
  modules.forEach(function(m){
    if(m.mesh) m.mesh.material.emissive=new THREE.Color(m===mod?0x553300:0x000000);
  });
  renderProps();
  openProps();
}

function deleteSelected(){
  if(!selected) return;
  if(selected.mesh) scene.remove(selected.mesh);
  modules=modules.filter(function(m){return m!==selected;});
  selected=null;
  closeProps();
  pushHist(); updateStats(); layoutRow();
}

function dupSelected(){
  if(!selected) return;
  var s=selected;
  addModule(s.type);
  if(selected){ selected.color=s.color; selected.mesh.material.color.set(s.color); }
}

function updateStats(){
  var n=modules.length;
  var board=0,facade=0,edge=0;
  modules.forEach(function(m){
    // kaba hesap: gövde alanı + cephe
    board += (2*m.h*m.d + 2*m.w*m.d + m.w*m.h)*1.0;
    facade += m.w*m.h;
    edge += (m.w+m.h)*2;
  });
  setTxt('stModules',n);
  setTxt('stBoard',board.toFixed(2));
  setTxt('stFacade',facade.toFixed(2));
  setTxt('stEdge',edge.toFixed(1));
  var hint=document.getElementById('emptyHint');
  if(hint) hint.style.display=n?'none':'block';
}
function setTxt(id,v){ var e=document.getElementById(id); if(e) e.textContent=v; }

// ════════ PALETTE UI ════════
function renderTabs(){
  var wrap=document.getElementById('paletteTabs'); if(!wrap) return;
  wrap.innerHTML=CATALOG.map(function(c){
    return '<button class="ptab" data-tab="'+c.id+'" onclick="openPalette(\''+c.id+'\')">'+
      '<span class="pico">'+c.ico+'</span><span>'+c.tab+'</span></button>';
  }).join('');
}

function openPalette(tabId){
  activeTab=tabId;
  var cat=CATALOG.find(function(c){return c.id===tabId;});
  if(!cat) return;
  document.getElementById('paletteTitle').textContent=cat.tab;
  document.getElementById('paletteGrid').innerHTML=cat.items.map(function(it){
    return '<div class="pitem" onclick="addModule(\''+it.type+'\')">'+
      '<span class="ico">'+it.ico+'</span>'+
      '<span class="nm">'+it.name+'</span>'+
      '<span class="dm">'+it.w+'×'+it.h+'</span></div>';
  }).join('');
  document.querySelectorAll('.ptab').forEach(function(t){
    t.classList.toggle('active', t.getAttribute('data-tab')===tabId);
  });
  document.getElementById('palette').classList.add('open');
  document.getElementById('props').classList.remove('open');
  if(window.innerWidth<900) document.getElementById('overlay').classList.add('open');
}
function closePalette(){
  document.getElementById('palette').classList.remove('open');
  document.querySelectorAll('.ptab').forEach(function(t){t.classList.remove('active');});
  if(!document.getElementById('props').classList.contains('open'))
    document.getElementById('overlay').classList.remove('open');
}

// ════════ PROPS UI ════════
function renderProps(){
  if(!selected) return;
  var m=selected;
  document.getElementById('propsTitle').textContent=m.name;
  var body=document.getElementById('propsBody');
  body.innerHTML=
    '<div class="prop-row"><label>Ширина <span class="val">'+Math.round(m.w*1000)+' мм</span></label>'+
      '<input type="range" min="200" max="2400" step="10" value="'+Math.round(m.w*1000)+'" oninput="setDim(\'w\',this.value)"></div>'+
    '<div class="prop-row"><label>Высота <span class="val">'+Math.round(m.h*1000)+' мм</span></label>'+
      '<input type="range" min="200" max="2400" step="10" value="'+Math.round(m.h*1000)+'" oninput="setDim(\'h\',this.value)"></div>'+
    '<div class="prop-row"><label>Глубина <span class="val">'+Math.round(m.d*1000)+' мм</span></label>'+
      '<input type="range" min="200" max="900" step="10" value="'+Math.round(m.d*1000)+'" oninput="setDim(\'d\',this.value)"></div>'+
    '<div class="prop-row"><label>Цвет</label><div class="color-grid">'+
      COLORS.map(function(c){ return '<div class="csw'+(c.hex===m.color?' active':'')+'" style="background:'+c.hex+'" onclick="setColor(\''+c.hex+'\')"></div>'; }).join('')+
    '</div></div>'+
    '<div class="props-actions">'+
      '<button class="btn-dup" onclick="dupSelected()">📋 Копия</button>'+
      '<button class="btn-del" onclick="deleteSelected()">🗑 Удалить</button>'+
    '</div>';
}

function setDim(axis,val){
  if(!selected) return;
  var m=selected, mm=parseInt(val)/1000;
  m[axis]=mm;
  // mesh yeniden kur
  if(m.mesh){ scene.remove(m.mesh); }
  buildMesh(m);
  layoutRow(); updateStats(); renderProps();
}
function setColor(hex){
  if(!selected) return;
  selected.color=hex;
  if(selected.mesh) selected.mesh.material.color.set(hex);
  renderProps();
}

function openProps(){
  document.getElementById('props').classList.add('open');
  document.getElementById('palette').classList.remove('open');
  if(window.innerWidth<900) document.getElementById('overlay').classList.add('open');
}
function closeProps(){
  document.getElementById('props').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  modules.forEach(function(m){ if(m.mesh) m.mesh.material.emissive=new THREE.Color(0x000000); });
  selected=null;
}
function closeAll(){ closePalette(); closeProps(); }

// ════════ HISTORY ════════
function snapshot(){
  return modules.map(function(m){ return {id:m.id,type:m.type,name:m.name,w:m.w,h:m.h,d:m.d,x:m.x,z:m.z,color:m.color}; });
}
function pushHist(){ hist=hist.slice(0,histIdx+1); hist.push(snapshot()); histIdx++; }
function undo(){
  if(histIdx<=0) return;
  histIdx--;
  restore(hist[histIdx]);
}
function restore(snap){
  modules.forEach(function(m){ if(m.mesh) scene.remove(m.mesh); });
  modules=snap.map(function(s){ var m=Object.assign({},s,{mesh:null}); buildMesh(m); return m; });
  selected=null; closeProps(); updateStats(); layoutRow();
}

// ════════ SAVE / RENDER ════════
function saveProject(){
  if(!sb||!project){ alert('Нет связи с базой'); return; }
  project.modules=snapshot();
  project.stats={modules:modules.length,
    board:parseFloat(document.getElementById('stBoard').textContent),
    facade:parseFloat(document.getElementById('stFacade').textContent),
    edge:parseFloat(document.getElementById('stEdge').textContent)};
  project.updated_at=new Date().toISOString();
  sb.from('alfa_3d_projects').update({modules:project.modules,stats:project.stats,updated_at:project.updated_at})
    .eq('id',projectId).then(function(res){
      if(res.error){ alert('Ошибка: '+res.error.message); }
      else { dbg('💾 сохранено'); var b=document.querySelector('.tb-btn.primary'); if(b){b.textContent='✓';setTimeout(function(){b.innerHTML='💾<span class="lbl">Сохранить</span>';},1200);} }
    });
}

function doRender(){
  if(!renderer) return;
  modules.forEach(function(m){ if(m.mesh) m.mesh.material.emissive=new THREE.Color(0x000000); });
  renderer.render(scene,camera);
  var url=renderer.domElement.toDataURL('image/png');
  var a=document.createElement('a'); a.href=url;
  a.download='alfa-'+(project?project.project_name:'proekt')+'.png'; a.click();
  if(selected) selectModule(selected);
}

function goBack(){ location.href='index.html'; }

// ════════ LOAD ════════
function loadProject(){
  if(!sb||!projectId){ dbg('demo (нет id)'); return Promise.resolve(); }
  return sb.from('alfa_3d_projects').select('*').eq('id',projectId).single().then(function(res){
    if(res.error||!res.data){ dbg('проект не найден'); return; }
    project=res.data;
    setTxt('projTitle',project.project_name||'Проект');
    if(project.modules&&project.modules.length){
      restore(project.modules);
    }
    dbg('загружен: '+project.project_name);
  });
}

// ════════ INIT ════════
function init(){
  // panelleri kesin kapat
  var pl=document.getElementById('palette'); if(pl) pl.classList.remove('open');
  var pr=document.getElementById('props'); if(pr) pr.classList.remove('open');
  var ov=document.getElementById('overlay'); if(ov) ov.classList.remove('open');

  try{ renderTabs(); }catch(e){ showErr('renderTabs: '+e.message); }
  try{ initThree(); }catch(e){ showErr('initThree: '+e.message); }
  loadProject().then(function(){ updateStats(); }).catch(function(e){ console.error(e); });
  dbg('готов · нажми категорию снизу');
}

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
else init();
</script>
