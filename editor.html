<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Alfa 3D Planner — Редактор</title>
<style>
  :root{
    --orange:#f97316; --orange-dark:#ea580c;
    --bg:#f4f6f9;          /* ana arka plan açık gri */
    --panel:#ffffff;       /* panel beyaz */
    --panel2:#fbfcfd;      /* hafif gri panel */
    --ink:#1e293b;         /* ana metin koyu */
    --gray:#94a3b8;        /* ikincil metin */
    --gray2:#64748b;
    --green:#16a34a;
    --line:#e8edf2;        /* ince ayraç çizgisi */
    --shadow:0 1px 3px rgba(15,23,42,.08), 0 4px 16px rgba(15,23,42,.06);
    --shadow-lg:0 -4px 24px rgba(15,23,42,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink)}

  /* ── TOPBAR ── */
  .topbar{position:fixed;top:0;left:0;right:0;height:56px;background:var(--panel);
    display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:100;
    border-bottom:1px solid var(--line);box-shadow:0 1px 2px rgba(15,23,42,.04)}
  .tb-left{display:flex;align-items:center;gap:8px;min-width:0}
  .tb-back{background:none;border:none;color:var(--ink);font-size:22px;cursor:pointer;padding:6px;flex:0 0 auto;line-height:1}
  .tb-title{font-weight:800;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
  .tb-ver{font-size:9px;color:#cbd5e1;flex:0 0 auto}
  .tb-actions{display:flex;gap:6px;flex:0 0 auto}
  .tb-btn{padding:9px 11px;background:var(--bg);border:1px solid var(--line);border-radius:10px;color:var(--ink);
    font-size:16px;cursor:pointer;transition:.15s;line-height:1}
  .tb-btn:active{background:#e8edf2;transform:scale(.96)}
  .tb-btn.primary{background:var(--orange);border-color:var(--orange);color:#fff;box-shadow:0 2px 8px rgba(249,115,22,.3)}
  .tb-btn.primary:active{background:var(--orange-dark)}
  .tb-btn .lbl{font-size:13px;font-weight:700;margin-left:5px}

  /* ── CANVAS ── */
  #canvas-wrap{position:fixed;top:56px;left:0;right:0;bottom:0;
    background:linear-gradient(180deg,#eef2f7 0%,#e2e8f0 100%)}
  #canvas-wrap canvas{display:block;width:100%;height:100%;touch-action:none}

  /* görünüm küpleri */
  .view-ctrl{position:absolute;top:12px;right:12px;display:flex;flex-direction:column;gap:6px;z-index:10}
  .view-btn{width:38px;height:38px;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;color:var(--ink);font-size:12px;font-weight:700;cursor:pointer;box-shadow:var(--shadow)}
  .view-btn:active{background:var(--orange);color:#fff}

  /* empty hint */
  .empty-hint{position:absolute;top:44%;left:50%;transform:translate(-50%,-50%);text-align:center;
    color:var(--gray2);z-index:5;pointer-events:none;width:80%}
  .empty-hint .big{font-size:46px;margin-bottom:10px;opacity:.35}
  .empty-hint p{font-size:14px;line-height:1.5;font-weight:600}

  /* ── INFO BAR ── */
  .infobar{position:fixed;left:0;right:0;bottom:0;height:48px;background:var(--panel);
    display:flex;align-items:center;gap:16px;padding:0 16px;z-index:80;
    border-top:1px solid var(--line);font-size:11px;overflow-x:auto;white-space:nowrap;color:var(--gray2);font-weight:600}
  .infobar b{color:var(--orange);margin-left:4px;font-weight:800}

  /* ── BOTTOM TABS (paleta açma) ── */
  .palette-tabs{position:fixed;left:0;right:0;bottom:48px;height:58px;background:var(--panel);
    display:flex;z-index:85;border-top:1px solid var(--line);overflow-x:auto;
    box-shadow:0 -1px 3px rgba(15,23,42,.04)}
  .ptab{flex:1 0 auto;min-width:66px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;background:none;border:none;color:var(--gray2);cursor:pointer;font-size:9px;font-weight:700;
    padding:6px 8px;transition:.15s;border-top:2.5px solid transparent}
  .ptab .pico{font-size:19px}
  .ptab.active{color:var(--orange);border-top-color:var(--orange);background:#fff7ed}

  /* ── PALETTE DRAWER (modül listesi) ── */
  .palette{position:fixed;left:0;right:0;bottom:106px;background:var(--panel);z-index:84;
    max-height:46vh;overflow-y:auto;transform:translateY(150vh);transition:transform .28s ease;
    border-radius:18px 18px 0 0;padding:8px 0 14px;box-shadow:var(--shadow-lg)}
  .palette.open{transform:translateY(0)}
  .palette-head{display:flex;align-items:center;justify-content:space-between;padding:6px 18px 12px;
    position:sticky;top:0;background:var(--panel);z-index:2}
  .palette-head h3{font-size:14px;font-weight:800;color:var(--ink)}
  .palette-close{background:var(--bg);border:none;color:var(--gray2);font-size:18px;cursor:pointer;
    line-height:1;width:30px;height:30px;border-radius:50%}
  .palette-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:10px;padding:0 14px}
  .pitem{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 6px;
    text-align:center;cursor:pointer;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:4px}
  .pitem:active{background:#fff7ed;border-color:var(--orange);transform:scale(.95)}
  .pitem .ico{font-size:26px}
  .pitem .nm{font-size:11px;font-weight:700;line-height:1.15;color:var(--ink)}
  .pitem .dm{font-size:9px;color:var(--gray)}

  /* ── PROPS PANEL (seçili modül) ── */
  .props{position:fixed;left:0;right:0;bottom:106px;background:var(--panel);z-index:86;
    max-height:50vh;overflow-y:auto;transform:translateY(150vh);transition:transform .28s ease;
    border-radius:18px 18px 0 0;padding:16px 18px 22px;box-shadow:var(--shadow-lg)}
  .props.open{transform:translateY(0)}
  .props-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .props-head h3{font-size:15px;font-weight:800;color:var(--ink)}
  .props-close{background:var(--bg);border:none;color:var(--gray2);font-size:18px;cursor:pointer;
    width:30px;height:30px;border-radius:50%}
  .prop-row{margin-bottom:16px}
  .prop-row label{font-size:11px;font-weight:700;color:var(--gray2);display:block;margin-bottom:7px;text-transform:uppercase;letter-spacing:.4px}
  .prop-row .val{color:var(--orange);float:right;text-transform:none;letter-spacing:0}
  .prop-row input[type=range]{width:100%;accent-color:var(--orange);height:6px}
  .prop-row input[type=number]{width:100%;padding:9px;background:var(--panel2);border:1px solid var(--line);
    border-radius:8px;color:var(--ink);font-size:13px}
  .dim-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .color-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:4px}
  .csw{width:100%;aspect-ratio:1;border-radius:9px;cursor:pointer;border:2px solid var(--line);
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.04)}
  .csw.active{border-color:var(--orange);transform:scale(1.12);box-shadow:0 2px 6px rgba(249,115,22,.3)}
  .props-actions{display:flex;gap:10px;margin-top:10px}
  .props-actions button{flex:1;padding:12px;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:13px}
  .btn-dup{background:#ecfdf5;color:var(--green);border:1px solid #bbf7d0}
  .btn-dup:active{background:#d1fae5}
  .btn-del{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
  .btn-del:active{background:#fee2e2}

  .overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.25);z-index:83}
  .overlay.open{display:block}

  /* ── DESKTOP ── */
  @media(min-width:900px){
    .tb-btn .lbl{display:inline}
    .palette-tabs{top:56px;bottom:auto;left:0;width:88px;height:auto;flex-direction:column;
      border-top:none;border-right:1px solid var(--line);overflow-y:auto}
    .ptab{flex:0 0 auto;border-top:none;border-left:2.5px solid transparent;padding:14px 4px}
    .ptab.active{border-top-color:transparent;border-left-color:var(--orange)}
    .palette{left:88px;width:300px;right:auto;top:56px;bottom:48px;max-height:none;
      border-radius:0;border-right:1px solid var(--line);box-shadow:var(--shadow);
      transform:translateX(-120vw)}
    .palette.open{transform:translateX(0)}
    .palette-grid{grid-template-columns:1fr 1fr}
    #canvas-wrap{left:88px}
    .infobar{left:88px}
    .props{left:auto;right:0;top:56px;bottom:48px;width:320px;max-height:none;
      border-radius:0;border-left:1px solid var(--line);box-shadow:var(--shadow);transform:translateX(120vw)}
    .props.open{transform:translateX(0)}
    .empty-hint{left:calc(50% + 44px)}
  }

  /* debug rozet */
  #dbg{position:fixed;bottom:112px;left:10px;z-index:500;background:rgba(30,41,59,.9);color:#7dd3fc;
    font-family:monospace;font-size:10px;padding:4px 9px;border-radius:8px;pointer-events:none;max-width:60vw}
  #err{position:fixed;top:56px;left:0;right:0;background:#dc2626;color:#fff;padding:8px 12px;z-index:9999;
    font-family:monospace;font-size:11px;display:none;white-space:pre-wrap;word-break:break-all}
</style>
</head>
<body>

</div>

<div class="infobar">
  <div>📦 Модулей:<b id="stModules">0</b></div>

  <div>📏 Кромка:<b id="stEdge">0</b>м</div>
</div>

<div id="dbg">init...</div>

<script>

// ════════ КАТАЛОГ (mm) ════════
var CATALOG=[
  {id:'room', tab:'Комната', ico:'🏠', isRoom:true, items:[]},
  {id:'base', tab:'Низ', ico:'🍳', items:[

  {hex:'#ffffff',name:'Белый'},   {hex:'#e8e0d0',name:'Беж'},
  {hex:'#c8915a',name:'Дуб'},     {hex:'#8b5a2b',name:'Орех'},
  {hex:'#5a4632',name:'Венге'},   {hex:'#2b2b2b',name:'Чёрный'},
  {hex:'#9aa6b2',name:'Серый'},   {hex:'#1e5945',name:'Зелёный'},
  {hex:'#1e3a5f',name:'Синий'},   {hex:'#7a1f2b',name:'Бордо'},
  {hex:'#d4af37',name:'Золото'},  {hex:'#f0f0f0',name:'Глянец'}
];

function findItem(type){
  for(var c=0;c<CATALOG.length;c++)
    for(var i=0;i<CATALOG[c].items.length;i++)
      if(CATALOG[c].items[i].type===type) return CATALOG[c].items[i];
  return null;
}

// ════════ STATE ════════
var scene,camera,renderer,raycaster,pointer;
var modules=[], selected=null, project=null;
var roomGroup=null;
var room={ width:4.0, depth:3.0, height:2.7, floor:'parquet', wall:'#eef1f5', countertop:true, ctColor:0x3a3a3a };
var hist=[], histIdx=-1;
var camA={theta:0.8,phi:0.95,radius:6}, camT;
var activeTab=null;

// ════════ THREE INIT ════════
function initThree(){
  if(scene) return true;
  if(typeof THREE==='undefined'){ showErr('THREE не загрузился'); return false; }
  var wrap=document.getElementById('canvas-wrap');
  if(!wrap) return false;
  var W=wrap.clientWidth||window.innerWidth, H=wrap.clientHeight||window.innerHeight;

  scene=new THREE.Scene();
  scene.background=new THREE.Color(0xe2e8f0);
  camera=new THREE.PerspectiveCamera(60,W/H,0.05,100);
  camT=new THREE.Vector3(0,0.8,0);

  renderer=new THREE.WebGLRenderer({antialias:true,preserveDrawingBuffer:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(W,H);
  renderer.shadowMap.enabled=true;
  wrap.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff,0.8));
  var dl=new THREE.DirectionalLight(0xffffff,0.7);
  dl.position.set(4,8,5); dl.castShadow=true; scene.add(dl);
  var dl2=new THREE.DirectionalLight(0xffffff,0.25);
  dl2.position.set(-5,3,-4); scene.add(dl2);

  // oda (zemin + duvarlar) - dinamik
  buildRoom();

  raycaster=new THREE.Raycaster();
  pointer=new THREE.Vector2();

  updateCam();
  setupControls(wrap);
  animate();
  window.addEventListener('resize',onResize);
  return true;
}

function onResize(){
  if(!renderer||!camera) return;
  var wrap=document.getElementById('canvas-wrap');
  var W=wrap.clientWidth||window.innerWidth, H=wrap.clientHeight||window.innerHeight;
  camera.aspect=W/H; camera.updateProjectionMatrix(); renderer.setSize(W,H);
}

function updateCam(){
  if(!camera) return;
  var s=camA;
  camera.position.x=camT.x+s.radius*Math.sin(s.phi)*Math.cos(s.theta);
  camera.position.y=camT.y+s.radius*Math.cos(s.phi);
  camera.position.z=camT.z+s.radius*Math.sin(s.phi)*Math.sin(s.theta);
  camera.lookAt(camT);
}

function setView(t){
  if(t==='top') camA={theta:Math.PI/2,phi:0.05,radius:7};
  else if(t==='front') camA={theta:Math.PI/2,phi:Math.PI/2-0.05,radius:6};
  else camA={theta:0.8,phi:0.95,radius:6};
  updateCam();
}
function resetCam(){ camT.set(0,0.8,0); setView('3d'); }

function setupControls(el){
  var lx,ly,mode=null,pdist=0;
  var dragMod=null;
  var groundY=0;

  // ekran noktasını zemin düzlemine yansıt
  function screenToGround(cx,cy){
    var r=el.getBoundingClientRect();
    pointer.x=((cx-r.left)/r.width)*2-1;
    pointer.y=-((cy-r.top)/r.height)*2+1;
    raycaster.setFromCamera(pointer,camera);
    var dir=raycaster.ray.direction, orig=raycaster.ray.origin;
    if(Math.abs(dir.y)<1e-5) return null;
    var tt=(groundY-orig.y)/dir.y;
    if(tt<0) return null;
    return {x:orig.x+dir.x*tt, z:orig.z+dir.z*tt};
  }
  // tıklanan modülü bul
  function modAt(cx,cy){
    var r=el.getBoundingClientRect();
    pointer.x=((cx-r.left)/r.width)*2-1;
    pointer.y=-((cy-r.top)/r.height)*2+1;
    raycaster.setFromCamera(pointer,camera);
    var meshes=modules.map(function(m){return m.mesh;}).filter(Boolean);
    var hits=raycaster.intersectObjects(meshes,true);
    if(hits.length){
      var o=hits[0].object; while(o.parent&&!o.userData.modId) o=o.parent;
      return modules.find(function(m){return m.id===o.userData.modId;});
    }
    return null;
  }

  el.addEventListener('mousedown',function(e){
    var hit=modAt(e.clientX,e.clientY);
    if(e.button===0 && hit && hit===selected){ mode='drag'; dragMod=hit; }
    else { mode=(e.button===2?'pan':'rot'); }
    lx=e.clientX; ly=e.clientY;
  });
  window.addEventListener('mouseup',function(){ mode=null; dragMod=null; });
  el.addEventListener('mousemove',function(e){
    if(!mode) return;
    if(mode==='drag'&&dragMod){
      var g=screenToGround(e.clientX,e.clientY);
      if(g){ dragMod.x=g.x; dragMod.z=g.z; dragMod._manual=true;
        var y=(dragMod.type.indexOf('wall')===0?1.45+dragMod.h/2:dragMod.h/2);
        if(dragMod.mesh) dragMod.mesh.position.set(g.x,y,g.z); buildCountertop(); }
      return;
    }
    var dx=e.clientX-lx, dy=e.clientY-ly; lx=e.clientX; ly=e.clientY;
    if(mode==='rot'){ camA.theta-=dx*0.01; camA.phi=Math.max(0.1,Math.min(Math.PI/2-0.02,camA.phi-dy*0.01)); }
    else { camT.x-=dx*0.01; camT.y+=dy*0.01; }
    updateCam();
  });
  el.addEventListener('wheel',function(e){ e.preventDefault(); camA.radius=Math.max(1.5,Math.min(20,camA.radius+e.deltaY*0.01)); updateCam(); },{passive:false});
  el.addEventListener('contextmenu',function(e){ e.preventDefault(); });
  el.addEventListener('click',function(e){ if(mode!=='drag'){ var h=modAt(e.clientX,e.clientY); if(h) selectModule(h); } });

  // touch
  var touchMoved=false, longPress=null;
  el.addEventListener('touchstart',function(e){
    touchMoved=false;
    if(e.touches.length===1){
      lx=e.touches[0].clientX; ly=e.touches[0].clientY;
      var hit=modAt(lx,ly);
      // seçili modüle basılı tutarsan sürükle
      if(hit && hit===selected){ mode='drag'; dragMod=hit; }
      else { mode='rot'; }
    } else if(e.touches.length===2){ mode='pinch'; pdist=tdist(e); }
  },{passive:false});
  el.addEventListener('touchmove',function(e){
    e.preventDefault(); touchMoved=true;
    if(mode==='drag'&&dragMod&&e.touches.length===1){
      var g=screenToGround(e.touches[0].clientX,e.touches[0].clientY);
      if(g){ dragMod.x=g.x; dragMod.z=g.z; dragMod._manual=true;
        var y=(dragMod.type.indexOf('wall')===0?1.45+dragMod.h/2:dragMod.h/2);
        if(dragMod.mesh) dragMod.mesh.position.set(g.x,y,g.z); buildCountertop(); }
    } else if(mode==='rot'&&e.touches.length===1){
      var dx=e.touches[0].clientX-lx, dy=e.touches[0].clientY-ly; lx=e.touches[0].clientX; ly=e.touches[0].clientY;
      camA.theta-=dx*0.01; camA.phi=Math.max(0.1,Math.min(Math.PI/2-0.02,camA.phi-dy*0.01)); updateCam();
    } else if(mode==='pinch'&&e.touches.length===2){
      var d=tdist(e); camA.radius=Math.max(1.5,Math.min(20,camA.radius-(d-pdist)*0.02)); pdist=d; updateCam();
    }
  },{passive:false});
  el.addEventListener('touchend',function(e){
    if(!touchMoved && mode!=='drag' && e.changedTouches.length===1){
      var h=modAt(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
      if(h) selectModule(h);
    }
    if(mode==='drag') pushHist();
    mode=null; dragMod=null;
  });
}
function tdist(e){ return Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); }

function addModule(type){
  dbg('addModule: '+type);
  if(!initThree()){ showErr('3D не готов'); return; }
  var info=findItem(type)||{w:600,h:850,d:560,name:type};
  var w=info.w/1000, h=info.h/1000, d=info.d/1000; // mm→m

  // yan yana diz
  var offX=0; modules.forEach(function(m){ offX+=m.w; });
  offX -= modules.reduce(function(a,m){return a+m.w;},0)/2; // ortala

  var mod={
    id:'m'+Date.now()+Math.floor(Math.random()*1000),
    type:type, name:info.name, w:w, h:h, d:d,
    x:offX+w/2, z:0, color:'#c8915a', mesh:null
  };
  buildMesh(mod);
  modules.push(mod);
  pushHist();
  updateStats();
  layoutRow();
  selectModule(mod);
  closePalette();
  dbg('OK: '+modules.length+' модулей');
}

// ════════ ОДА (zemin + duvarlar) ════════
function makeFloorTexture(kind){
  var c=document.createElement('canvas'); c.width=512; c.height=512;
  var x=c.getContext('2d');
  if(kind==='parquet'){
    x.fillStyle='#c8975a'; x.fillRect(0,0,512,512);
    var pw=512/4, ph=512/8;
    for(var r=0;r<8;r++){
      for(var col=0;col<4;col++){
        var off=(r%2)*(pw/2);
        var px=col*pw - off, py=r*ph;
        var shade=200+Math.floor(Math.random()*40);
        x.fillStyle='rgb('+shade+','+Math.floor(shade*0.72)+','+Math.floor(shade*0.42)+')';
        x.fillRect(px+1,py+1,pw-2,ph-2);
        x.strokeStyle='rgba(120,80,40,.25)'; x.lineWidth=1;
        for(var g=0;g<3;g++){ x.beginPath(); x.moveTo(px,py+ph*(g+1)/4); x.lineTo(px+pw,py+ph*(g+1)/4); x.stroke(); }
        x.strokeStyle='rgba(90,60,30,.5)'; x.strokeRect(px+1,py+1,pw-2,ph-2);
      }
    }
    return texFrom(c,4,4);
  }
  if(kind==='tile'){
    x.fillStyle='#e9ecef'; x.fillRect(0,0,512,512);
    var n=4, t=512/n;
    for(var i=0;i<n;i++)for(var j=0;j<n;j++){
      var v=235+Math.floor(Math.random()*16);
      x.fillStyle='rgb('+v+','+v+','+(v+2)+')';
      x.fillRect(i*t+2,j*t+2,t-4,t-4);
    }
    x.strokeStyle='#c2c8d0'; x.lineWidth=3;
    for(var k=0;k<=n;k++){ x.beginPath();x.moveTo(k*t,0);x.lineTo(k*t,512);x.stroke();
      x.beginPath();x.moveTo(0,k*t);x.lineTo(512,k*t);x.stroke(); }
    return texFrom(c,3,3);
  }
  if(kind==='laminate'){
    x.fillStyle='#d8c4a0'; x.fillRect(0,0,512,512);
    for(var b=0;b<6;b++){
      var by=b*(512/6), v2=205+Math.floor(Math.random()*35);
      x.fillStyle='rgb('+v2+','+Math.floor(v2*0.85)+','+Math.floor(v2*0.65)+')';
      x.fillRect(0,by+1,512,512/6-2);
      x.strokeStyle='rgba(150,120,80,.3)';
      for(var gg=0;gg<5;gg++){ x.beginPath();x.moveTo(0,by+(512/6)*(gg+1)/6);x.lineTo(512,by+(512/6)*(gg+1)/6);x.stroke(); }
    }
    return texFrom(c,3,4);
  }
  return null;
}
function texFrom(canvas,rx,ry){
  var t=new THREE.CanvasTexture(canvas);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  t.repeat.set(rx,ry);
  return t;
}

function buildRoom(){
  if(roomGroup){ scene.remove(roomGroup); }
  roomGroup=new THREE.Group();
  roomGroup.userData.helper=true;

  var W=room.width, D=room.depth, H=room.height;

  // ── ZEMİN ──
  var floorMat;
  if(room.floor==='none'){
    floorMat=new THREE.MeshStandardMaterial({color:0xf4f6f9,roughness:0.95});
  } else {
    var tex=makeFloorTexture(room.floor);
    floorMat=new THREE.MeshStandardMaterial({map:tex,roughness:0.85});
  }
  var floor=new THREE.Mesh(new THREE.PlaneGeometry(W,D),floorMat);
  floor.rotation.x=-Math.PI/2;
  floor.receiveShadow=true;
  roomGroup.add(floor);

  // ── DUVARLAR (arka + sol, köşe) ──
  var wallMat=new THREE.MeshStandardMaterial({color:room.wall,roughness:0.95,side:THREE.DoubleSide});
  var back=new THREE.Mesh(new THREE.PlaneGeometry(W,H),wallMat);
  back.position.set(0,H/2,-D/2); back.receiveShadow=true;
  roomGroup.add(back);
  var left=new THREE.Mesh(new THREE.PlaneGeometry(D,H),wallMat);
  left.rotation.y=Math.PI/2; left.position.set(-W/2,H/2,0); left.receiveShadow=true;
  roomGroup.add(left);

  // süpürgelik
  var plMat=new THREE.MeshStandardMaterial({color:0xffffff,roughness:0.6});
  var plB=new THREE.Mesh(new THREE.BoxGeometry(W,0.08,0.02),plMat);
  plB.position.set(0,0.04,-D/2+0.011); roomGroup.add(plB);
  var plL=new THREE.Mesh(new THREE.BoxGeometry(0.02,0.08,D),plMat);
  plL.position.set(-W/2+0.011,0.04,0); roomGroup.add(plL);

  scene.add(roomGroup);
  if(camT) camT.set(0,H*0.35,0);
}

function rebuildRoom(){ buildRoom(); layoutRow(); }

// ════════ GERÇEKÇI MODÜL (gövde + cephe + kulp) ════════
function buildMesh(mod){
  var g=new THREE.Group();
  g.userData.modId=mod.id;

  var w=mod.w, h=mod.h, d=mod.d;
  var bodyColor=0xf0ece4;                         // gövde (ЛДСП iç) açık
  var faceColor=mod.color;                        // cephe rengi
  var t=0.018;                                    // panel kalınlığı 18mm

  var bodyMat=new THREE.MeshStandardMaterial({color:bodyColor,roughness:0.75});
  var faceMat=new THREE.MeshStandardMaterial({color:faceColor,roughness:0.55,metalness:0.04});

  // ── GÖVDE (carcass): 5 panel (alt, üst, sol, sağ, arka) ──
  function panel(pw,ph,pd,px,py,pz,mat){
    var m=new THREE.Mesh(new THREE.BoxGeometry(pw,ph,pd),mat||bodyMat);
    m.position.set(px,py,pz); m.castShadow=true; m.receiveShadow=true;
    g.add(m); return m;
  }
  // yan paneller
  panel(t,h,d, -w/2+t/2, 0, 0);                   // sol
  panel(t,h,d,  w/2-t/2, 0, 0);                   // sağ
  // alt + üst
  panel(w-2*t,t,d, 0, -h/2+t/2, 0);               // alt
  panel(w-2*t,t,d, 0,  h/2-t/2, 0);               // üst
  // arka panel (ince)
  panel(w-2*t,h-2*t,0.004, 0,0,-d/2+0.004);

  // ── CEPHE (fasad) ── kapı gizliyse atla
  var faces=[];
  if(!mod.hideFront){
    var isDrawer = mod.type.indexOf('draw')>=0;
    var gap=0.003;                                // cepheler arası boşluk
    if(isDrawer){
      // çekmece cepheleri - sayı ayarlanabilir
      var n=mod.drawers||3, fh=(h-2*gap*n)/n;
      var railColor = mod.fRail==='tandem'?0x3b82f6 : (mod.fRail==='metabox'?0x64748b : 0x94a3b8);
      for(var i=0;i<n;i++){
        var fy=-h/2+gap+fh/2+i*(fh+gap);
        var fm=new THREE.Mesh(new THREE.BoxGeometry(w-2*gap,fh-gap,t),faceMat);
        fm.position.set(0,fy,d/2-t/2+0.002); fm.castShadow=true;
        g.add(fm); faces.push(fm);
        addHandle(g,mod,0,fy+fh/2-0.04,d/2,'h'); // çekmecede yatay kulp üstte
        // çekmece ray çizgileri (yan, görünür furnitura)
        if(mod.fRail && mod.fRail!=='roller'){
          var railMat=new THREE.MeshStandardMaterial({color:railColor,roughness:0.4,metalness:0.6});
          [-1,1].forEach(function(side){
            var rail=new THREE.Mesh(new THREE.BoxGeometry(0.012,0.008,d*0.8),railMat);
            rail.position.set(side*(w/2-0.02), fy-fh/2+0.02, -0.02);
            g.add(rail);
          });
        }
      }
    } else if(mod.type.indexOf('open')>=0 || mod.type==='wall_open'){
      // açık raf - cephe yok, iç raf koy
      panel(w-2*t,t,d-0.02, 0, 0, 0);             // orta raf
    } else {
      // kapı(lar): genişlik 600+ ise çift kapı
      var dbl = w>0.55;
      if(dbl){
        var dw=(w-3*gap)/2;
        var dL=new THREE.Mesh(new THREE.BoxGeometry(dw,h-2*gap,t),faceMat);
        dL.position.set(-dw/2-gap/2,0,d/2-t/2+0.002); dL.castShadow=true; g.add(dL); faces.push(dL);
        var dR=new THREE.Mesh(new THREE.BoxGeometry(dw,h-2*gap,t),faceMat);
        dR.position.set(dw/2+gap/2,0,d/2-t/2+0.002); dR.castShadow=true; g.add(dR); faces.push(dR);
        addHandle(g,mod, -gap, 0, d/2,'v');       // ortada
        addHandle(g,mod,  gap, 0, d/2,'v');
      } else {
        var dr=new THREE.Mesh(new THREE.BoxGeometry(w-2*gap,h-2*gap,t),faceMat);
        dr.position.set(0,0,d/2-t/2+0.002); dr.castShadow=true; g.add(dr); faces.push(dr);
        addHandle(g,mod, w/2-0.05, 0, d/2,'v');   // sağda dikey kulp
      }
    }
  }
  mod._faces=faces;

  // ── KADEME 4: penal/boy dolap içi (kapı gizliyse veya kargo seçiliyse görünür) ──
  var isTall = mod.type.indexOf('tall')===0 || mod.type.indexOf('wr')===0;
  if(isTall && (mod.hideFront || (mod.fCargo && mod.fCargo!=='shelf'))){
    if(mod.fCargo==='cargo'){
      // karго - dikey tel sepetler
      var cMat=new THREE.MeshStandardMaterial({color:0xb0b8c0,roughness:0.4,metalness:0.6});
      for(var ci=0;ci<4;ci++){
        var basket=new THREE.Mesh(new THREE.BoxGeometry(w*0.7,0.04,d*0.7),cMat);
        basket.position.set(0,-h/2+0.3+ci*0.4,0); g.add(basket);
      }
    } else if(mod.fCargo==='bottle'){
      // şişelik - dar dikey raflar
      var bMat=new THREE.MeshStandardMaterial({color:0xb0b8c0,roughness:0.4,metalness:0.6});
      var rack=new THREE.Mesh(new THREE.BoxGeometry(w*0.3,h*0.8,d*0.6),
        new THREE.MeshStandardMaterial({color:0xc0c8d0,roughness:0.5,metalness:0.4,transparent:true,opacity:0.6}));
      rack.position.set(0,0,0); g.add(rack);
    } else {
      // raflar
      for(var ri=0;ri<4;ri++){
        var shelf=new THREE.Mesh(new THREE.BoxGeometry(w-2*t,t,d-0.04),bodyMat);
        shelf.position.set(0,-h/2+0.4+ri*((h-0.5)/3),0); g.add(shelf);
      }
    }
  }

  // ── seçim çerçevesi (highlight) ──
  var box=new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.BoxGeometry(w,h,d)),
    new THREE.LineBasicMaterial({color:0xf97316,transparent:true,opacity:0})
  );
  box.userData.selBox=true;
  g.add(box);
  mod._selBox=box;

  g.position.set(mod.x, mod.h/2, mod.z);
  if(mod.rot) g.rotation.y=mod.rot;
  scene.add(g);
  mod.mesh=g;
}

// kulp ekle (tip: skoba/knob/profil)
function addHandle(group,mod,hx,hy,halfD,orient){
  var kind=mod.handle||'skoba';
  var hMat=new THREE.MeshStandardMaterial({color:0x9aa3ad,roughness:0.35,metalness:0.7});
  if(kind==='none') return;
  var hz=halfD+0.012;
  if(kind==='knob'){
    var k=new THREE.Mesh(new THREE.SphereGeometry(0.011,12,12),hMat);
    k.position.set(hx,hy,hz); group.add(k); return;
  }
  // skoba (kulp çubuğu) - dikey ya da yatay
  var len=(orient==='v')?0.12:0.16;
  var geo=(orient==='v')?new THREE.BoxGeometry(0.012,len,0.018):new THREE.BoxGeometry(len,0.012,0.018);
  var bar=new THREE.Mesh(geo,hMat);
  bar.position.set(hx,hy,hz); group.add(bar);
}

function layoutRow(){
  var startX=-room.width/2;
  var backZ=-room.depth/2;
  var x=startX;
  modules.forEach(function(m){
    if(m._manual){ // elle taşınmışsa dokunma
      if(m.mesh) m.mesh.position.set(m.x,(m.type.indexOf('wall')===0?1.45+m.h/2:m.h/2),m.z);
      return;
    }
    m.x=x+m.w/2;
    var y=m.h/2;
    if(m.type.indexOf('wall')===0) y=1.45+m.h/2;
    m.z=backZ + m.d/2 + 0.02;
    if(m.mesh){ m.mesh.position.set(m.x,y,m.z); if(m.rot) m.mesh.rotation.y=m.rot; }
    x+=m.w;
  });
  buildCountertop();
}

// ════════ TEZGAH (столешница) ════════
var countertopGroup=null;
function buildCountertop(){
  if(countertopGroup){ scene.remove(countertopGroup); countertopGroup=null; }
  if(!room.countertop) return;
  var bases=modules.filter(function(m){ return m.type.indexOf('base')===0; });
  if(!bases.length) return;
  countertopGroup=new THREE.Group();
  countertopGroup.userData.helper=true;
  var ctMat=new THREE.MeshStandardMaterial({color:room.ctColor||0x3a3a3a,roughness:0.4,metalness:0.1});
  var th=0.04, over=0.02;
  bases.forEach(function(m){
    var slab=new THREE.Mesh(new THREE.BoxGeometry(m.w+0.002, th, m.d+over),ctMat);
    slab.position.set(m.x, m.h+th/2, m.z+over/2);
    slab.castShadow=true; slab.receiveShadow=true;
    countertopGroup.add(slab);
  });
  scene.add(countertopGroup);
}


function selectModule(mod){
  selected=mod;
  modules.forEach(function(m){
    if(m._selBox) m._selBox.material.opacity = (m===mod?1:0);
  });
  renderProps();
  openProps();
}

function deleteSelected(){
  if(!selected) return;
  if(selected.mesh) scene.remove(selected.mesh);
  modules=modules.filter(function(m){return m!==selected;});
  selected=null;
  closeProps();
  pushHist(); updateStats(); layoutRow();
}

function dupSelected(){
  if(!selected) return;
  var s=selected;
  addModule(s.type);
  if(selected){
    selected.color=s.color; selected.handle=s.handle; selected.hideFront=s.hideFront;
    if(selected.mesh) scene.remove(selected.mesh);
    buildMesh(selected);
    layoutRow();
  }
}

function updateStats(){
  var n=modules.length;
  var board=0,facade=0,edge=0;
  modules.forEach(function(m){
    // kaba hesap: gövde alanı + cephe
    board += (2*m.h*m.d + 2*m.w*m.d + m.w*m.h)*1.0;
    facade += m.w*m.h;
    edge += (m.w+m.h)*2;
  });
  setTxt('stModules',n);
  setTxt('stBoard',board.toFixed(2));
  setTxt('stFacade',facade.toFixed(2));
  setTxt('stEdge',edge.toFixed(1));
  var hint=document.getElementById('emptyHint');
  if(hint) hint.style.display=n?'none':'block';
}
function setTxt(id,v){ var e=document.getElementById(id); if(e) e.textContent=v; }

// ════════ PALETTE UI ════════
function renderTabs(){
  var wrap=document.getElementById('paletteTabs'); if(!wrap) return;
  wrap.innerHTML=CATALOG.map(function(c){
    return '<button class="ptab" data-tab="'+c.id+'" onclick="openPalette(\''+c.id+'\')">'+
      '<span class="pico">'+c.ico+'</span><span>'+c.tab+'</span></button>';
  }).join('');
}

function openPalette(tabId){
  activeTab=tabId;
  var cat=CATALOG.find(function(c){return c.id===tabId;});
  if(!cat) return;
  document.getElementById('paletteTitle').textContent=cat.tab;

  var grid=document.getElementById('paletteGrid');
  if(cat.isRoom){
    grid.innerHTML=roomPanelHTML();
  } else {
    grid.innerHTML=cat.items.map(function(it){
      return '<div class="pitem" onclick="addModule(\''+it.type+'\')">'+
        '<span class="ico">'+it.ico+'</span>'+
        '<span class="nm">'+it.name+'</span>'+
        '<span class="dm">'+it.w+'×'+it.h+'</span></div>';
    }).join('');
  }
  document.querySelectorAll('.ptab').forEach(function(t){
    t.classList.toggle('active', t.getAttribute('data-tab')===tabId);
  });
  document.getElementById('palette').classList.add('open');
  document.getElementById('props').classList.remove('open');
  if(window.innerWidth<900) document.getElementById('overlay').classList.add('open');
}

  // duvar rengi
  h+='<div style="font-size:11px;font-weight:800;color:var(--gray2);text-transform:uppercase;letter-spacing:.4px;margin:4px 0 8px">Цвет стен</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:16px">';
  h+=walls.map(function(w){
    return '<div class="csw'+(room.wall===w?' active':'')+'" style="background:'+w+'" onclick="setWall(\''+w+'\')"></div>';
  }).join('');
  h+='</div>';
  // oda boyutu
  h+='<div style="font-size:11px;font-weight:800;color:var(--gray2);text-transform:uppercase;letter-spacing:.4px;margin:4px 0 8px">Столешница</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">'+
     '<button onclick="toggleCountertop()" style="padding:10px;border-radius:8px;border:1px solid '+(room.countertop?'var(--orange)':'var(--line)')+';background:'+(room.countertop?'#fff7ed':'var(--panel2)')+';font-size:12px;font-weight:700;color:var(--ink);cursor:pointer">'+(room.countertop?'✓ Есть':'Нет')+'</button>'+
     '<input type="color" value="#3a3a3a" onchange="setCtColor(this.value)" style="width:100%;height:40px;border:1px solid var(--line);border-radius:8px;cursor:pointer;background:var(--panel2)">'+
     '</div>';
  h+='<div style="font-size:11px;font-weight:800;color:var(--gray2);text-transform:uppercase;letter-spacing:.4px;margin:4px 0 8px">Размер комнаты</div>';
  h+='<div style="margin-bottom:10px"><label style="font-size:11px;color:var(--gray2)">Ширина <b style="color:var(--orange);float:right" id="rwVal">'+Math.round(room.width*1000)+' мм</b></label>'+
     '<input type="range" min="2000" max="8000" step="100" value="'+Math.round(room.width*1000)+'" style="width:100%;accent-color:var(--orange)" oninput="setRoomDim(\'width\',this.value)"></div>';
  h+='<div style="margin-bottom:10px"><label style="font-size:11px;color:var(--gray2)">Глубина <b style="color:var(--orange);float:right" id="rdVal">'+Math.round(room.depth*1000)+' мм</b></label>'+
     '<input type="range" min="2000" max="8000" step="100" value="'+Math.round(room.depth*1000)+'" style="width:100%;accent-color:var(--orange)" oninput="setRoomDim(\'depth\',this.value)"></div>';
  h+='<div style="margin-bottom:6px"><label style="font-size:11px;color:var(--gray2)">Высота <b style="color:var(--orange);float:right" id="rhVal">'+Math.round(room.height*1000)+' мм</b></label>'+
     '<input type="range" min="2400" max="3500" step="50" value="'+Math.round(room.height*1000)+'" style="width:100%;accent-color:var(--orange)" oninput="setRoomDim(\'height\',this.value)"></div>';
  h+='</div>';
  return h;
}
function setFloor(id){ room.floor=id; rebuildRoom(); openPalette('room'); }
function setWall(hex){ room.wall=hex; rebuildRoom(); openPalette('room'); }
function toggleCountertop(){ room.countertop=!room.countertop; buildCountertop(); openPalette('room'); }
function setCtColor(hex){ room.ctColor=parseInt(hex.replace('#','0x')); buildCountertop(); }
function setRoomDim(key,val){
  room[key]=parseInt(val)/1000;
  rebuildRoom();
  var map={width:'rwVal',depth:'rdVal',height:'rhVal'};
  var el=document.getElementById(map[key]); if(el) el.textContent=Math.round(room[key]*1000)+' мм';
}

function closePalette(){
  document.getElementById('palette').classList.remove('open');
  document.querySelectorAll('.ptab').forEach(function(t){t.classList.remove('active');});
  if(!document.getElementById('props').classList.contains('open'))
    document.getElementById('overlay').classList.remove('open');
}

// ════════ PROPS UI ════════
function renderProps(){
  if(!selected) return;
  var m=selected;
  document.getElementById('propsTitle').textContent=m.name;
  var handles=[
    {id:'skoba',name:'Скоба'},{id:'rail',name:'Рейлинг'},{id:'knob',name:'Кнопка'},
    {id:'profil',name:'Профиль'},{id:'none',name:'Без ручки'}
  ];
  var isDrawer = m.type.indexOf('draw')>=0;
  var isTall   = m.type.indexOf('tall')===0 || m.type.indexOf('wr')===0;
  var isWall   = m.type.indexOf('wall')===0;

  var body=document.getElementById('propsBody');
  var html=
    '<div class="prop-row"><label>Ширина <span class="val">'+Math.round(m.w*1000)+' мм</span></label>'+
      '<input type="range" min="200" max="2400" step="10" value="'+Math.round(m.w*1000)+'" oninput="setDim(\'w\',this.value)"></div>'+
    '<div class="prop-row"><label>Высота <span class="val">'+Math.round(m.h*1000)+' мм</span></label>'+
      '<input type="range" min="200" max="2400" step="10" value="'+Math.round(m.h*1000)+'" oninput="setDim(\'h\',this.value)"></div>'+
    '<div class="prop-row"><label>Глубина <span class="val">'+Math.round(m.d*1000)+' мм</span></label>'+
      '<input type="range" min="200" max="900" step="10" value="'+Math.round(m.d*1000)+'" oninput="setDim(\'d\',this.value)"></div>'+
    '<div class="prop-row"><label>Цвет фасада</label><div class="color-grid">'+
      COLORS.map(function(c){ return '<div class="csw'+(c.hex===m.color?' active':'')+'" style="background:'+c.hex+'" onclick="setColor(\''+c.hex+'\')"></div>'; }).join('')+
    '</div></div>'+
    '<div class="prop-row"><label>Ручка</label><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">'+
      handles.map(function(h){ return '<button onclick="setHandle(\''+h.id+'\')" style="padding:8px 4px;border-radius:8px;border:1px solid '+((m.handle||'skoba')===h.id?'var(--orange)':'var(--line)')+';background:'+((m.handle||'skoba')===h.id?'#fff7ed':'var(--panel2)')+';font-size:10px;font-weight:700;color:var(--ink);cursor:pointer">'+h.name+'</button>'; }).join('')+
    '</div></div>';

  // ── KADEME 4: ФУРНИТУРА ──
  html+='<div class="prop-row" style="border-top:1px solid var(--line);padding-top:12px">'+
    '<label style="color:var(--orange)">⚙️ Фурнитура</label></div>';

  if(isDrawer){
    // çekmece ray sistemi
    var rails=[{id:'roller',name:'Роликовые'},{id:'tandem',name:'Tandembox'},{id:'metabox',name:'Метабокс'}];
    html+='<div class="prop-row"><label>Направляющие</label><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">'+
      rails.map(function(r){ return '<button onclick="setFurn(\'rail\',\''+r.id+'\')" style="padding:8px 4px;border-radius:8px;border:1px solid '+((m.fRail||'roller')===r.id?'var(--orange)':'var(--line)')+';background:'+((m.fRail||'roller')===r.id?'#fff7ed':'var(--panel2)')+';font-size:10px;font-weight:700;color:var(--ink);cursor:pointer">'+r.name+'</button>'; }).join('')+
    '</div></div>';
    // çekmece sayısı
    html+='<div class="prop-row"><label>Кол-во ящиков <span class="val">'+(m.drawers||3)+'</span></label>'+
      '<input type="range" min="1" max="5" step="1" value="'+(m.drawers||3)+'" oninput="setFurn(\'drawers\',this.value)"></div>';
  }
  if(!isDrawer && !isWall){
    // menteşe (kapılı modüller)
    var hinges=[{id:'std',name:'Обычные'},{id:'soft',name:'С доводчиком'}];
    html+='<div class="prop-row"><label>Петли</label><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">'+
      hinges.map(function(hg){ return '<button onclick="setFurn(\'hinge\',\''+hg.id+'\')" style="padding:8px;border-radius:8px;border:1px solid '+((m.fHinge||'std')===hg.id?'var(--orange)':'var(--line)')+';background:'+((m.fHinge||'std')===hg.id?'#fff7ed':'var(--panel2)')+';font-size:11px;font-weight:700;color:var(--ink);cursor:pointer">'+hg.name+'</button>'; }).join('')+
    '</div></div>';
  }
  if(isWall){
    // üst dolap - Aventos kaldırma
    html+='<div class="prop-row"><label>Подъёмник (Aventos)</label><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">'+
      [{id:'no',name:'Нет'},{id:'aventos',name:'Aventos HK'}].map(function(a){ return '<button onclick="setFurn(\'lift\',\''+a.id+'\')" style="padding:8px;border-radius:8px;border:1px solid '+((m.fLift||'no')===a.id?'var(--orange)':'var(--line)')+';background:'+((m.fLift||'no')===a.id?'#fff7ed':'var(--panel2)')+';font-size:11px;font-weight:700;color:var(--ink);cursor:pointer">'+a.name+'</button>'; }).join('')+
    '</div></div>';
  }
  if(isTall){
    // penal - kargo/dolap içi
    var cargos=[{id:'shelf',name:'Полки'},{id:'cargo',name:'Карго'},{id:'bottle',name:'Бутылочница'}];
    html+='<div class="prop-row"><label>Наполнение</label><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">'+
      cargos.map(function(cg){ return '<button onclick="setFurn(\'cargo\',\''+cg.id+'\')" style="padding:8px 4px;border-radius:8px;border:1px solid '+((m.fCargo||'shelf')===cg.id?'var(--orange)':'var(--line)')+';background:'+((m.fCargo||'shelf')===cg.id?'#fff7ed':'var(--panel2)')+';font-size:10px;font-weight:700;color:var(--ink);cursor:pointer">'+cg.name+'</button>'; }).join('')+
    '</div></div>';
  }

  html+='<div class="prop-row" style="border-top:1px solid var(--line);padding-top:12px"><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+
      '<button onclick="rotateSelected()" style="padding:11px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);font-weight:700;font-size:12px;color:var(--ink);cursor:pointer">🔄 Повернуть 90°</button>'+
      '<button onclick="toggleFront()" style="padding:11px;border-radius:8px;border:1px solid var(--line);background:'+(m.hideFront?'#fff7ed':'var(--panel2)')+';font-weight:700;font-size:12px;color:var(--ink);cursor:pointer">'+(m.hideFront?'👁 Показать':'🚪 Скрыть')+' фасад</button>'+
    '</div></div>'+
    '<div class="props-actions">'+
      '<button class="btn-dup" onclick="dupSelected()">📋 Копия</button>'+
      '<button class="btn-del" onclick="deleteSelected()">🗑 Удалить</button>'+
    '</div>';
  body.innerHTML=html;
}

// Kademe 4: furnitura ayarla
function setFurn(key,val){
  if(!selected) return;
  if(key==='rail') selected.fRail=val;
  else if(key==='drawers'){ selected.drawers=parseInt(val); }
  else if(key==='hinge') selected.fHinge=val;
  else if(key==='lift') selected.fLift=val;
  else if(key==='cargo') selected.fCargo=val;
  rebuildSelected();
}

function setHandle(id){
  if(!selected) return;
  selected.handle=id;
  rebuildSelected();
}
function toggleFront(){
  if(!selected) return;
  selected.hideFront=!selected.hideFront;
  rebuildSelected();
}
function rotateSelected(){
  if(!selected) return;
  selected.rot=((selected.rot||0)+Math.PI/2)%(Math.PI*2);
  if(selected.mesh) selected.mesh.rotation.y=selected.rot;
}
function rebuildSelected(){
  if(!selected) return;
  if(selected.mesh) scene.remove(selected.mesh);
  buildMesh(selected);
  if(selected._selBox) selected._selBox.material.opacity=1;
  layoutRow(); renderProps();
}

function setDim(axis,val){
  if(!selected) return;
  var m=selected, mm=parseInt(val)/1000;
  m[axis]=mm;
  if(m.mesh){ scene.remove(m.mesh); }
  buildMesh(m);
  if(m._selBox) m._selBox.material.opacity=1;
  layoutRow(); updateStats(); renderProps();
}
function setColor(hex){
  if(!selected) return;
  selected.color=hex;
  if(selected.mesh) scene.remove(selected.mesh);
  buildMesh(selected);
  if(selected._selBox) selected._selBox.material.opacity=1;
  layoutRow();
  renderProps();
}

function openProps(){
  document.getElementById('props').classList.add('open');
  document.getElementById('palette').classList.remove('open');
  if(window.innerWidth<900) document.getElementById('overlay').classList.add('open');
}
function closeProps(){
  document.getElementById('props').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  modules.forEach(function(m){ if(m._selBox) m._selBox.material.opacity=0; });
  selected=null;
}
function closeAll(){ closePalette(); closeProps(); closeList(); }

// ════════ MODÜL LİSTESİ ════════
function toggleList(){
  var p=document.getElementById('listPanel');
  if(p.classList.contains('open')){ closeList(); return; }
  renderList();
  p.classList.add('open');
  document.getElementById('palette').classList.remove('open');
  document.getElementById('props').classList.remove('open');
  if(window.innerWidth<900) document.getElementById('overlay').classList.add('open');
}
function closeList(){
  var lp=document.getElementById('listPanel');
  if(lp) lp.classList.remove('open');
  if(!document.getElementById('props').classList.contains('open') &&
     !document.getElementById('palette').classList.contains('open'))
    document.getElementById('overlay').classList.remove('open');
}
function renderList(){
  var body=document.getElementById('listBody');
  if(!body) return;
  if(!modules.length){ body.innerHTML='<p style="color:var(--gray2);font-size:13px;text-align:center;padding:20px">Модулей нет</p>'; return; }
  body.innerHTML=modules.map(function(m,i){
    return '<div style="display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;background:var(--panel2)">'+
      '<div style="width:28px;height:28px;border-radius:6px;background:'+m.color+';border:1px solid var(--line);flex:0 0 auto"></div>'+
      '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700">'+(i+1)+'. '+m.name+'</div>'+
      '<div style="font-size:11px;color:var(--gray2)">'+Math.round(m.w*1000)+'×'+Math.round(m.h*1000)+'×'+Math.round(m.d*1000)+' мм</div></div>'+
      '<button onclick="selectFromList('+i+')" style="padding:7px 10px;border:none;border-radius:7px;background:var(--orange);color:#fff;font-weight:700;font-size:11px;cursor:pointer">✏️</button>'+
      '</div>';
  }).join('');
}
function selectFromList(i){
  if(!modules[i]) return;
  closeList();
  selectModule(modules[i]);
}


// ════════ HISTORY ════════
function snapshot(){
  return modules.map(function(m){ return {id:m.id,type:m.type,name:m.name,w:m.w,h:m.h,d:m.d,x:m.x,z:m.z,color:m.color,handle:m.handle,hideFront:m.hideFront,rot:m.rot,_manual:m._manual,
    fRail:m.fRail,drawers:m.drawers,fHinge:m.fHinge,fLift:m.fLift,fCargo:m.fCargo}; });
}
function pushHist(){ hist=hist.slice(0,histIdx+1); hist.push(snapshot()); histIdx++; }
function undo(){
  if(histIdx<=0) return;
  histIdx--;
  restore(hist[histIdx]);
}
function restore(snap){
  modules.forEach(function(m){ if(m.mesh) scene.remove(m.mesh); });
  modules=snap.map(function(s){ var m=Object.assign({},s,{mesh:null}); buildMesh(m); return m; });
  selected=null; closeProps(); updateStats(); layoutRow();
}

// ════════ SAVE / RENDER ════════
function saveProject(){
  if(!sb||!project){ alert('Нет связи с базой'); return; }
  var payload={ items:snapshot(), room:room };  // modüller + oda ayarı birlikte
  project.modules=payload;
  project.stats={modules:modules.length,
    board:parseFloat(document.getElementById('stBoard').textContent),
    facade:parseFloat(document.getElementById('stFacade').textContent),
    edge:parseFloat(document.getElementById('stEdge').textContent)};
  project.updated_at=new Date().toISOString();
  sb.from('alfa_3d_projects').update({modules:project.modules,stats:project.stats,updated_at:project.updated_at})
    .eq('id',projectId).then(function(res){
      if(res.error){ alert('Ошибка: '+res.error.message); }
      else { dbg('💾 сохранено'); var b=document.querySelector('.tb-btn.primary'); if(b){b.textContent='✓';setTimeout(function(){b.innerHTML='💾<span class="lbl">Сохранить</span>';},1200);} }
    });
}

function doRender(){
  if(!renderer) return;
  modules.forEach(function(m){ if(m._selBox) m._selBox.material.opacity=0; });
  renderer.render(scene,camera);
  var url=renderer.domElement.toDataURL('image/png');
  var a=document.createElement('a'); a.href=url;
  a.download='alfa-'+(project?project.project_name:'proekt')+'.png'; a.click();
  if(selected) selectModule(selected);
}

function goBack(){ location.href='index.html'; }

// ════════ LOAD ════════
function loadProject(){
  if(!sb||!projectId){ dbg('demo (нет id)'); return Promise.resolve(); }
  return sb.from('alfa_3d_projects').select('*').eq('id',projectId).single().then(function(res){
    if(res.error||!res.data){ dbg('проект не найден'); return; }
    project=res.data;
    setTxt('projTitle',project.project_name||'Проект');
    var md=project.modules;
    if(md){
      // yeni format: {items:[...], room:{...}} | eski format: [...]
      if(Array.isArray(md)){
        if(md.length) restore(md);
      } else {
        if(md.room){ room=Object.assign(room, md.room); rebuildRoom(); }
        if(md.items && md.items.length) restore(md.items);
      }
    }
    dbg('загружен: '+project.project_name);
  });
}

// ════════ INIT ════════
function init(){
  // panelleri kesin kapat
  var pl=document.getElementById('palette'); if(pl) pl.classList.remove('open');
  var pr=document.getElementById('props'); if(pr) pr.classList.remove('open');
  var lp=document.getElementById('listPanel'); if(lp) lp.classList.remove('open');
  var ov=document.getElementById('overlay'); if(ov) ov.classList.remove('open');

  try{ renderTabs(); }catch(e){ showErr('renderTabs: '+e.message); }
  try{ initThree(); }catch(e){ showErr('initThree: '+e.message); }
  loadProject().then(function(){ updateStats(); }).catch(function(e){ console.error(e); });
  dbg('готов · нажми категорию снизу');
}

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
else init();
</script>
