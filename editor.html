window.addEventListener('error', function(e){
  // Harici CDN'den gelen detaysız "Script error." mesajlarını yok say (genelde zararsız CORS)
  if(!e.message || e.message === 'Script error.' || e.lineno === 0) return;
  var box = document.getElementById('errBox');
  if(!box){
    box = document.createElement('div');
    box.id = 'errBox';
    box.style.cssText = 'position:fixed;top:54px;left:0;right:0;background:#dc2626;color:#fff;padding:10px;z-index:99999;font-family:monospace;font-size:12px;white-space:pre-wrap;word-break:break-all';
    document.body.appendChild(box);
  }
  box.textContent = '❌ ' + e.message + ' :' + e.lineno;
});
</script>

<style>
  :root{
    --orange:#f97316; --orange-dark:#ea580c; --dark:#0f172a; --dark2:#1e293b;
    --gray:#64748b; --light:#f1f5f9; --border:#e2e8f0; --green:#16a34a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0e1a;color:#e2e8f0;overflow:hidden;height:100vh}

  /* Топ бар */
  .topbar{position:fixed;top:0;left:0;right:0;height:54px;background:var(--dark2);
    display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:100;
    box-shadow:0 2px 12px rgba(0,0,0,.4);border-bottom:1px solid rgba(255,255,255,.06)}
  .topbar-left{display:flex;align-items:center;gap:12px}
  .back-btn{background:none;border:none;color:#fff;cursor:pointer;font-size:18px;padding:8px}
  .back-btn:hover{color:var(--orange)}
  .topbar-title{font-weight:700;font-size:15px}
  .topbar-actions{display:flex;gap:8px}
  .tb-btn{padding:8px 12px;background:rgba(255,255,255,.08);border:none;border-radius:6px;color:#fff;
    font-size:12px;font-weight:700;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:6px}
  .tb-btn:hover{background:rgba(255,255,255,.15)}
  .tb-btn.primary{background:var(--orange)}
  .tb-btn.primary:hover{background:var(--orange-dark)}

  /* Сол сайдбар */
  .sidebar{position:fixed;top:54px;left:0;bottom:0;width:260px;background:var(--dark2);
    z-index:90;overflow-y:auto;padding:0;border-right:1px solid rgba(255,255,255,.06)}
  .sidebar-search{position:sticky;top:0;background:var(--dark2);padding:12px;z-index:5;
    border-bottom:1px solid rgba(255,255,255,.06)}
  .sidebar-search input{width:100%;padding:8px 10px;background:#0f172a;border:1px solid rgba(255,255,255,.1);
    border-radius:8px;color:#fff;font-size:12px;font-family:inherit}
  .sidebar-search input::placeholder{color:var(--gray)}

  /* Accordion kategori */
  .cat{border-bottom:1px solid rgba(255,255,255,.04)}
  .cat-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;
    transition:.2s;user-select:none}
  .cat-head:hover{background:rgba(255,255,255,.03)}
  .cat-head .cat-name{font-size:12px;font-weight:800;color:#e2e8f0;display:flex;align-items:center;gap:8px}
  .cat-head .cat-name .cat-emoji{font-size:16px}
  .cat-head .cat-count{font-size:10px;color:var(--gray);background:rgba(255,255,255,.06);
    padding:2px 7px;border-radius:10px;font-weight:700}
  .cat-head .cat-arrow{color:var(--gray);font-size:10px;transition:transform .25s;margin-left:6px}
  .cat.open .cat-arrow{transform:rotate(90deg)}
  .cat-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
  .cat.open .cat-body{max-height:2000px}
  .module-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:4px 12px 14px}
  .module-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:8px;
    padding:10px 6px;cursor:pointer;transition:.15s;text-align:center;color:#cbd5e1;font-size:10px;font-weight:700;
    display:flex;flex-direction:column;align-items:center;gap:4px;line-height:1.2}
  .module-btn:hover{background:var(--orange);color:#fff;transform:translateY(-2px);
    box-shadow:0 4px 10px rgba(249,115,22,.25)}
  .module-btn .ico{font-size:22px;display:block}
  .module-btn .dims{font-size:8px;color:var(--gray);font-weight:600}
  .module-btn:hover .dims{color:rgba(255,255,255,.8)}
  .no-results{padding:30px 14px;text-align:center;color:var(--gray);font-size:12px}

  /* Оң сайдбар - Properties */
  .props{position:fixed;top:54px;right:0;bottom:0;width:280px;background:var(--dark2);
    z-index:90;overflow-y:auto;padding:14px;border-left:1px solid rgba(255,255,255,.06);
    transform:translateX(100%);transition:transform .3s}
  .props.open{transform:translateX(0)}
  .prop-section{margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.05)}
  .prop-section:last-child{border-bottom:none}
  .prop-row{margin-bottom:10px}
  .prop-row label{font-size:11px;font-weight:700;color:var(--gray);display:block;margin-bottom:4px}
  .prop-row input[type=number],.prop-row input[type=range]{width:100%;padding:6px;background:#0f172a;
    border:1px solid rgba(255,255,255,.1);border-radius:4px;color:#fff;font-size:12px}
  .color-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:6px}
  .color-swatch{width:100%;aspect-ratio:1;border-radius:6px;cursor:pointer;border:2px solid transparent;
    transition:.15s}
  .color-swatch.active{border-color:#fff;transform:scale(1.15)}
  .copy-btn, .del-btn{width:100%;padding:8px;border:none;border-radius:6px;font-weight:700;cursor:pointer;
    margin-top:6px;transition:.2s;font-size:12px}
  .copy-btn{background:var(--green);color:#fff}
  .copy-btn:hover{background:rgba(22,163,74,.8)}
  .del-btn{background:rgba(220,38,38,.3);color:#ef4444;border:1px solid rgba(220,38,38,.5)}
  .del-btn:hover{background:rgba(220,38,38,.4)}

  /* Canvas */
  #canvas-wrap{position:fixed;top:54px;left:260px;right:280px;bottom:50px;
    background:linear-gradient(180deg,#1a2236 0%,#0a0e1a 100%)}

  .view-controls{position:absolute;top:12px;right:12px;display:flex;gap:6px;z-index:10}
  .view-btn{width:36px;height:36px;background:rgba(30,41,59,.9);border:1px solid rgba(255,255,255,.1);
    border-radius:6px;color:#fff;cursor:pointer;font-size:12px;font-weight:700;transition:.2s}
  .view-btn:hover{background:var(--orange)}

  /* Информационная строка */
  .infobar{position:fixed;bottom:0;left:260px;right:280px;height:50px;background:rgba(15,23,42,.92);
    backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;z-index:80;border-top:1px solid rgba(255,255,255,.06);font-size:12px}
  .info-stats{display:flex;gap:16px}
  .info-stat b{color:var(--orange);margin-left:4px}

  /* Empty hint */
  .empty-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;
    color:var(--gray);z-index:5;pointer-events:none}
  .empty-hint .big{font-size:48px;margin-bottom:12px;opacity:.4}
  .empty-hint p{font-size:13px;max-width:250px}

  /* Modal - BOM / PDF */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none;
    align-items:center;justify-content:center;padding:20px}
  .modal.open{display:flex}
  .modal-box{background:var(--dark2);border-radius:12px;padding:24px;max-width:600px;width:100%;
    max-height:80vh;overflow-auto;border:1px solid rgba(255,255,255,.1)}
  .modal-box h3{margin-bottom:16px;font-size:16px;font-weight:700}
  .bom-table{width:100%;border-collapse:collapse;font-size:12px}
  .bom-table th{text-align:left;padding:10px 8px;background:rgba(255,255,255,.05);font-weight:700;border-bottom:1px solid rgba(255,255,255,.1)}
  .bom-table td{padding:8px;border-bottom:1px solid rgba(255,255,255,.05)}
  .bom-table tr:hover{background:rgba(255,255,255,.02)}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
  .btn-close{padding:8px 12px;background:rgba(255,255,255,.08);border:none;border-radius:6px;
    color:#fff;cursor:pointer;font-weight:700}
  .btn-download{padding:8px 12px;background:var(--orange);border:none;border-radius:6px;
    color:#fff;cursor:pointer;font-weight:700}

  @media(max-width:1024px){
    .sidebar,.props{width:220px}
    #canvas-wrap{left:220px;right:0}
    .infobar{left:220px;right:0}
  }

  /* ── MOBİL (telefon) ── */
  .mobile-fab{display:none}
  @media(max-width:768px){
    /* Sol panel: alttan açılan çekmece */
    .sidebar{
      width:100%;left:0;right:0;top:auto;bottom:0;height:62vh;
      transform:translateY(100%);transition:transform .3s;
      border-right:none;border-top:2px solid var(--orange);
      border-radius:16px 16px 0 0;z-index:300
    }
    .sidebar.open{transform:translateY(0)}
    /* tutamak çubuğu */
    .sidebar::before{content:'';position:sticky;top:0;display:block;width:40px;height:4px;
      background:rgba(255,255,255,.3);border-radius:2px;margin:8px auto 0}

    #canvas-wrap{left:0;right:0;bottom:90px;top:54px}
    .infobar{left:0;right:0;bottom:0;height:56px;font-size:11px;padding:0 10px}
    .info-stats{gap:10px}

    /* Sağ panel (properties) tam genişlik alttan */
    .props{width:100%;left:0;right:0;border-left:none;

      top:auto;bottom:0;height:55vh;transform:translateY(100%);z-index:310}
    .props.open{transform:translateY(0)}

    .topbar{padding:0 8px}
    .tb-btn{padding:7px 8px;font-size:11px}
    .tb-btn span.lbl{display:none}  /* sadece ikon kalsın */

    /* Yüzen "Модули" butonu */
    .mobile-fab{display:flex;position:fixed;bottom:72px;left:50%;transform:translateX(-50%);
      z-index:250;background:var(--orange);color:#fff;border:none;border-radius:24px;
      padding:12px 24px;font-size:14px;font-weight:800;box-shadow:0 4px 16px rgba(249,115,22,.5);
      align-items:center;gap:8px;cursor:pointer}
    .mobile-fab:active{transform:translateX(-50%) scale(.96)}

    /* Çekmece kapatma overlay */
    .drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:290}
    .drawer-overlay.open{display:block}

    .module-grid{grid-template-columns:1fr 1fr 1fr;gap:6px;padding:4px 10px 14px}
  }
</style>
</head>

<button class="mobile-fab" id="mobileFab">📦 Модули</button>

</div>

</div>

// ═══════════════ SIDEBAR RENDER (accordion) ═══════════════
function renderCatalog(){
  const wrap = document.getElementById('moduleCategories');
  if(!wrap) return;
  wrap.innerHTML = MODULE_CATALOG.map(cat => `
    <div class="cat ${cat.open ? 'open' : ''}" data-cat="${cat.id}">
      <div class="cat-head" onclick="toggleCat('${cat.id}')">
        <div class="cat-name"><span class="cat-emoji">${cat.emoji}</span>${cat.name}</div>
        <div style="display:flex;align-items:center">
          <span class="cat-count">${cat.items.length}</span>
          <span class="cat-arrow">▶</span>
        </div>
      </div>
      <div class="cat-body">
        <div class="module-grid">
          ${cat.items.map(it => `
            <div class="module-btn" data-name="${it.name.toLowerCase()}" onclick="addModule('${it.type}')">
              <span class="ico">${it.ico}</span>
              <span>${it.name}</span>
              <span class="dims">${it.w}×${it.h}×${it.d}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function toggleCat(id){
  const cat = document.querySelector('.cat[data-cat="'+id+'"]');
  if(cat) cat.classList.toggle('open');
}

function filterModules(query){
  query = (query||'').toLowerCase().trim();
  const cats = document.querySelectorAll('.cat');
  cats.forEach(cat => {
    let visibleCount = 0;
    cat.querySelectorAll('.module-btn').forEach(btn => {
      const match = !query || btn.getAttribute('data-name').includes(query);
      btn.style.display = match ? '' : 'none';
      if(match) visibleCount++;
    });
    // arama varsa eşleşen kategorileri aç, boşları gizle
    if(query){
      cat.style.display = visibleCount ? '' : 'none';
      if(visibleCount) cat.classList.add('open');
    } else {
      cat.style.display = '';
    }
  });
}

// Modül kataloğundan tip bilgisi bul (boyut vs için)
function getModuleInfo(type){
  for(const cat of MODULE_CATALOG){
    const found = cat.items.find(i => i.type === type);
    if(found) return found;
  }
  return null;
}

// Three.js globals
let camAngle = {theta:0.7, phi:0.9, radius:7};
let camTarget = new THREE.Vector3(0, 1, 0);

async function init(){
  // 1. Katalog ve mobil çekmece - EN ÖNEMLİSİ, başta ve korumalı
  try { renderCatalog(); } catch(e){ console.error('renderCatalog:', e); }
  try { setupMobileDrawer(); } catch(e){ console.error('setupMobileDrawer:', e); }

  // 2. Three.js sahnesini başlat (proje olmasa da boş sahne görünsün)
  try { initThree(); } catch(e){ console.error('initThree:', e); }

  // 3. Proje yükle
  if(projectId && supabase){
    try {
      await loadProject();
      renderScene();
    } catch(e){ console.error('loadProject:', e); }
  }

  try { renderProperties(); } catch(e){ console.error('renderProperties:', e); }
  console.log('✅ Editor init tamam');
}

function setupMobileDrawer(){
  const fab = document.getElementById('mobileFab');
  const sidebar = document.querySelector('.sidebar');
  const overlay = document.getElementById('drawerOverlay');
  if(!fab || !sidebar || !overlay) return;

  function openDrawer(){ sidebar.classList.add('open'); overlay.classList.add('open'); }
  function closeDrawer(){ sidebar.classList.remove('open'); overlay.classList.remove('open'); }

  fab.addEventListener('click', openDrawer);
  overlay.addEventListener('click', closeDrawer);

  sidebar.addEventListener('click', function(e){
    if(e.target.closest('.module-btn') && window.innerWidth <= 768){
      setTimeout(closeDrawer, 150);
    }
  });
}

async function loadProject(){
  const {data, error} = await supabase.from('alfa_3d_projects').select('*').eq('id', projectId).single();
  if(error || !data){
    console.error('Проект не загружен:', error);
    return;
  }
  currentProject = data;
  const titleEl = document.getElementById('projectTitle');
  if(titleEl) titleEl.textContent = data.project_name || 'Проект';
  modules = data.modules || [];
  updateStats();
}

function initThree(){
  const wrap = document.getElementById('canvas-wrap');
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0e1a);
  
  camera = new THREE.PerspectiveCamera(75, wrap.clientWidth/wrap.clientHeight, 0.1, 1000);
  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(wrap.clientWidth, wrap.clientHeight);
  renderer.shadowMap.enabled = true;
  wrap.appendChild(renderer.domElement);

  // Освещение
  const light1 = new THREE.DirectionalLight(0xffffff, 0.8);
  light1.position.set(5, 5, 5);
  light1.castShadow = true;
  scene.add(light1);

  const light2 = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(light2);

  // Сетка
  const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
  scene.add(gridHelper);

  updateCamera();
  setupControls();
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = wrap.clientWidth/wrap.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(wrap.clientWidth, wrap.clientHeight);
  });
}

function setupControls(){
  const el = renderer.domElement;
  let lastX, lastY;
  
  el.addEventListener('mousedown', e => {
    if(e.button === 0) { // LMB - rotate
      lastX = e.clientX;
      lastY = e.clientY;
    } else if(e.button === 2) { // RMB - pan
      lastX = e.clientX;
      lastY = e.clientY;
    }
  }, false);

  el.addEventListener('mousemove', e => {
    if(e.buttons & 1) { // Left button
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      camAngle.theta -= dx * 0.01;
      camAngle.phi = Math.max(0.1, Math.min(Math.PI/2 - 0.05, camAngle.phi - dy * 0.01));
      updateCamera();
      lastX = e.clientX;
      lastY = e.clientY;
    }
  }, false);

  el.addEventListener('wheel', e => {
    e.preventDefault();
    camAngle.radius = Math.max(2, Math.min(20, camAngle.radius + e.deltaY * 0.01));
    updateCamera();
  }, {passive:false});

  el.addEventListener('contextmenu', e => e.preventDefault());
}

function updateCamera(){
  const {theta, phi, radius} = camAngle;
  camera.position.x = camTarget.x + radius * Math.sin(phi) * Math.cos(theta);
  camera.position.y = camTarget.y + radius * Math.cos(phi);
  camera.position.z = camTarget.z + radius * Math.sin(phi) * Math.sin(theta);
  camera.lookAt(camTarget);
}

function setView(type){
  if(type === 'top') camAngle = {theta:Math.PI/2, phi:0.05, radius:8};
  else if(type === 'front') camAngle = {theta:Math.PI/2, phi:Math.PI/2 - 0.05, radius:7};
  else camAngle = {theta:0.7, phi:0.9, radius:7};
  updateCamera();
}

function resetCam(){
  camTarget.set(0, 1, 0);
  camAngle = {theta:0.7, phi:0.9, radius:7};
  updateCamera();
}

function addModule(type){
  const info = getModuleInfo(type);
  // katalog mm cinsinden, sahnede cm kullanıyoruz (boyut/10)
  const w = info ? info.w/10 : 60;
  const h = info ? info.h/10 : 80;
  const d = info ? info.d/10 : 60;
  const name = info ? info.name : type.replace(/_/g, ' ');

  // yeni modülü öncekinin yanına koy (üst üste binmesin)
  let offsetX = 0;
  modules.forEach(m => { offsetX += (m.w||60); });

  const module = {
    id: Date.now().toString() + Math.floor(Math.random()*1000),
    type: type,
    name: name,
    w: w, h: h, d: d,
    x: offsetX, y: 0, z: 0,
    color: 0xc8915a,
    material: 'wood'
  };

  modules.push(module);
  addToHistory();
  renderScene();
  updateStats();
}

function renderScene(){
  if(!scene){ return; }  // Three.js hazır değilse çık
  // Clear old meshes
  scene.children = scene.children.filter(o => !(o.userData && o.userData.isModule));

  modules.forEach(m => {
    const geo = new THREE.BoxGeometry(m.w/100, m.h/100, m.d/100);
    const mat = new THREE.MeshStandardMaterial({color: m.color, roughness:0.7, metalness:0.05});
    const mesh = new THREE.Mesh(geo, mat);
    // y: kutu merkezini yüksekliğin yarısına koy ki tabanı zemine değsin
    mesh.position.set(m.x/100, (m.h/2)/100, m.z/100);
    mesh.userData.isModule = true;
    mesh.userData.moduleId = m.id;
    mesh.castShadow = true;

    // kenar çizgisi (daha okunaklı)
    const edges = new THREE.LineSegments(
      new THREE.EdgesGeometry(geo),
      new THREE.LineBasicMaterial({color: 0x000000, transparent:true, opacity:0.25})
    );
    mesh.add(edges);

    scene.add(mesh);
  });

  document.getElementById('emptyHint').style.display = modules.length ? 'none' : 'block';
}

function updateStats(){
  const count = modules.length;
  const board = (count * 0.5).toFixed(2);
  const facade = (count * 0.3).toFixed(2);
  const edge = (count * 2.5).toFixed(1);

  const sm = document.getElementById('statModules'); if(sm) sm.textContent = count;
  const sb2 = document.getElementById('statBoard'); if(sb2) sb2.textContent = board;
  const sf = document.getElementById('statFacade'); if(sf) sf.textContent = facade;
  const se = document.getElementById('statEdge'); if(se) se.textContent = edge;
}

function renderProperties(){
  const el = document.getElementById('propsContent');
  if(!el) return;
  el.innerHTML = '<div style="font-size:12px;color:var(--gray)">' +
    (modules.length ? 'Выберите модуль на сцене' : 'Модулей нет') + '</div>';
}

function openBOMModal(){
  const body = modules.map((m, i) => `
    <tr>
      <td>${m.name}</td>
      <td>1</td>
      <td>0.5</td>
      <td>0.3</td>
      <td>2.5</td>
    </tr>
  `).join('');

  document.getElementById('bomBody').innerHTML = body;
  document.getElementById('bomBoardTotal').textContent = (modules.length * 0.5).toFixed(2);
  document.getElementById('bomFacadeTotal').textContent = (modules.length * 0.3).toFixed(2);
  document.getElementById('bomEdgeTotal').textContent = (modules.length * 2.5).toFixed(1);
  document.getElementById('bomModal').classList.add('open');
}

function closeBOM(){
  document.getElementById('bomModal').classList.remove('open');
}

function downloadBOM(){
  const csv = 'Модуль,Кол-во,ЛДСП (м²),Фасад (м²),Кромка (м)\n' +
    modules.map(m => `${m.name},1,0.5,0.3,2.5`).join('\n');
  
  const a = document.createElement('a');
  a.href = 'data:text/csv,' + encodeURIComponent(csv);
  a.download = 'bom-' + currentProject.project_name + '.csv';
  a.click();
}

function exportPDF(){
  alert('PDF экспорт (скоро) — пока скачайте BOM и рендер');
}

function takeRender(){
  renderer.render(scene, camera);
  const url = renderer.domElement.toDataURL('image/png');
  const a = document.createElement('a');
  a.href = url;
  a.download = 'render-' + currentProject.project_name + '.png';
  a.click();
}

async function saveProject(){
  currentProject.modules = modules;
  currentProject.updated_at = new Date().toISOString();

  const {error} = await supabase.from('alfa_3d_projects').update(currentProject).eq('id', projectId);
  if(error){
    console.error('Save error:', error);
    alert('Ошибка при сохранении');
  } else {
    alert('✓ Проект сохранен');
  }
}

function addToHistory(){
  history = history.slice(0, historyIndex + 1);
  history.push(JSON.parse(JSON.stringify(modules)));
  historyIndex++;
}

function undo(){
  if(historyIndex > 0){
    historyIndex--;
    modules = JSON.parse(JSON.stringify(history[historyIndex]));
    renderScene();
    updateStats();
  }
}

function redo(){
  if(historyIndex < history.length - 1){
    historyIndex++;
    modules = JSON.parse(JSON.stringify(history[historyIndex]));
    renderScene();
    updateStats();
  }
}

function goBack(){
  window.location.href = 'index.html';
}

function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

// Init - DOM hazır olunca
if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
